body:
  text: 愚谷集卷一明李舜臣撰詩自叙曰沁水常明卿先生何如人哉而䝉謗罷官歸卒又數年始稱其詩所謂常評事集刊在南康郡署讀其詩何忝我明之世乎而徒遺後人嗟雖然愈于與骨并朽者焉嚴氏之言曰詩有别材非關書也今始知之而往十八年間余頗有詩二百首餘語有之彼屋之隆寧僂我躬余之不能付余詩火亦有以矣未村居士李舜臣題部署稿春夕日夕散車騎攬轡每委遲署松紛翠靄宫栁何菀斯入門纎月上宿鳥滿庭枝微風振遺凜暮色正凄其客心易為感萬念咸在茲豈無芳草色祗足攪歸思春日懷歸陶令賦歸辭漆叟稱達生揆余企髙躅頗亦悅幽情永惟故山日桃李此時榮萋萋原上草粲粲園中英翠莖浮澗藻丹葩艷山櫻疏池納文鯉伐木候春鶯陽澤今豈異撫物阻神京昔人歎非土能不念吾耕早春憶故園往茲薦禫日朱明甫南移青青原麥秀嫋嫋陌桑枝家世本農業曾讀耕田詩豐臯餉童僕薄往閲耘耔剪茨開舊圃命板成曩基修楊鬱近岸翠柏榮前墀木實紛丹碧蔬挺何葳㽔晨雞夕自入夏蟬秋始悲别來嵗云暮又見春草滋興言念故宇感激能無思有懷故園親族昔豫遘天禍負葬歸東州寒暑倐流易三載捷更籌微息幸猶續壯志嗟已休譬之凝霜草衰枯在九秋又似不材木托根于林丘遭逢聖人朝岩穴拔淹留遂忘不肖軀感激昨來遊故園日已逺荒壠誰為耰親族忽若遺有懷安所投茲身雖千里夢寐常相求王程限南北歸路何悠悠不能似髙鳥去來雲中由俯仰覺心傷淚下如泉流復除戶部吾往被沉痾乞歸向桑梓蹉跎狗馬軀殘生得無死迂愚偶自忘將身仍上北去國二載餘王正欣至正威儀覩漢官百爾瞻君子不有賢豪人豈復知吾鄙當塗辟持衡低昂定嘗擬顧惟朽鈍姿徙官亦有以猶懼不克任中心寧自理不見昔時賢遭逢尚如彼賈傅哭長沙中郎錮邊里釋過且兼茲叨䝉詎有涘猶竊紫宸班亦友青雲士省署復多暇得不廢書史竊比鷦鷯枝取適惟容趾敢希大隱名晦跡云朝市贈别髙子業今上始龍飛中興如日旭文物何休明忠賢盡來復殊方獻白環嘉氣瞻黃屋生逢泰階平偶竊南宫録君時獨少年為衆所屬目翰墨已縱橫威儀亦肅穆手自握蘭蓀猶似欽余馥因彈貢公冠果枉山濤牘九萬擬層霄隨君忽遐䎘晨趨建章班夕散司衡局明時重交游暇日相徴逐歡言詎足珍意氣乃多淑上欲窺鴻濛直遡羲皇朴其次稱詩書頗慚馬遷獨作賦凖班揚舒詞邁阮陸遙遙十載心悠悠久未副分手自曩茲開顔亦昨倐微志不及申薄遊遂再辱何知此為别去住俱迫促惟有慰相離榮名能自朂聞言簡髙子業白日麗層空鵷雛逝有適饑鳶啄其下區區虞見迫腐鼠豈其珍徒爾聲相嚇人生有定姿寧與浮名易亦有灌園人三公棄如擲寸心茍不察殷憂復何益雨夜八月風露清雨落猶如注浹旬今不休無乃神龍怒衾裯早已寒蹉跎未能去棄置自千秋人生貴有素紛紛輕薄兒莫以賢豪故直省憶藍玉甫時渠在係省宿良幽曠撫已忽多闕為問夜何其長河還未沒孤愁當此時惆悵難可歇事變信何常棄捐成倐忽幽拘復在茲念子每驚骨子今無羽翼歸歟當曷月有感洴澼或難免機橰不可為豈不貴所用工拙有相宜當津遊上才皎皎揚英姿伊豫山野人微尚殊支離下翔限斥鷃歸捧慚西施不如修初服從此遄還期太宰喬公送行詩時吐魯番入寇夢寐錫宸衷台衡屬上公蒼生安石在衮職仲山工萬壑深滄海繁星爛碧空兵戈今老去逖矣哲人風送丁德卿出守撫州康樂臨川日江山屬壯遊羡君今出守於此復鳴騶地以紅泉勝亭餘碧澗幽遙知詞賦手千載揖風流夜歸憐此歸來晚蕭蕭夜色深月明孤鳥宿秋急亂蟲吟名薄勞萋斐心疏滯紱簪因思郎署裏賢俊昔如林驗封署芍藥獨不開花羣芳時欲歇惜此獨荒凉自昔名元美當春意故藏無人知艷色何事吝清香翻被東園樹因風笑爾狂晚歸匹馬衝煙落荒階漸月移正多桑梓意無奈蕙蘭衰浮滯秋將杪長愁鬢欲絲依墻惟數菊過此亦難支不寐夜氣凉如水羈心耿似星風鳴應落樹月上欲侵櫺去住身皆拙遲回計不停明朝從季主試向卦中聽酒醒何限摧心事常因醉裏輕扳歡隨近舍縱飲托同聲尚憶憑人入應多宿鳥驚沉昏知可戒穩卧偶吾情再調考功已作還鄉計秋風却病軀清時登片善華列及吾迂豈有溫如玉翻疑暗似珠由來山鳥性不願九韶娛秋夕庭中悵然有懷吳文濟御史時渠將有閩中之行金氣當軒肅蒼煙使舍幽下階聊獨往倚樹忽千憂名逐羣芳晚心摧落日秋所親仍别去炎德指南州送吳文濟入閩行色將南指君恩向闕辭拂霜蓬且轉明日酒難持去國能無惜分襟復在茲直須春草遍始是解裝時嘗酒豈是葡萄釀祗憑玉露斯愁多須此仗祿薄本相宜束帶陶將去登樓粲有思何言頑與聖更盡手中巵寄任元朴去國今二載猶傳諌諍名聖朝非爾棄時俗乍相傾跡向陶丘斂書從梁獄明平生欲何似嵗暮卧山城秋夕吳文濟御史見訪出省惟公暇深居每獨思故人驄馬客薄暮菊花巵月正清秋滿霜裁變露為非君茲枉駕何限使吾悲寄劉叔正蜀中劍閣青山外都門紫氣邊相看俱萬里分手已三年去國是何日浮槎想近天念從衆君子交結昔何妍問答吾有滄州興兼聞貝錦詩秋風輕棹發朞月省郎辭夜織看星轉春耕候雨施何如羣智裡憂苦意長疲憶在東山日看君智似髙頃緣趨召至應為念歸勞稼穡聞嘗學桑麻手所操由來𤣥豹質多在霧中韜寄報家兄吾有歸志此處故人稀緇塵况滿衣祗緣五斗重滋覺寸心非海上鷗堪狎天邊雁欲飛終當親稼穡白首共山扉聞言豈是蛾眉者時聞謠諑喧從來多不免如我復何言冠蓋慚新識漁樵悔故村東南如假翼歸路一朝翻郊壇候駕金扉啓禁垣火樹照平原警蹕鳴空下旌旗夾路翻一龍蹡日馭百獸舞雲門嵗嵗甘泉上瞻迎萬乘尊贈黃時庸海岱惟吾土生才每不羣承明今謁帝意氣始知君叔度陂千頃簫韶奏九聞仍看作者志直欲繼斯文闕下初心醉堂中共目成映尊梅未盡承步草新生白雪聽歌郢甘泉見賦京吾承騷雅後何限慰交情城隅别某匹馬送將違心搖正欲飛好依官道栁且傍老萊衣草藉清尊滿花餘故樹稀平生君共我獨自夕陽歸春日姚氏園候客嘗從賔席末聞道郭園名之子舟將泛茲吾蓋少傾花明嬌日色鳥作弄春聲便可留今夕應多滿月情春日飲蘭亭章石室時與黃李二子同坐共到蘭亭飲仍因石室留如何城市裏亦有洞巖幽泛鼎疑煙宿當窗似澗秋俄聞鶯響發無乃谷中求入朝逢李子西御史聨步烏動秋河徹雞鳴夜漏空樓煙霜更紫海色曙全紅星落千官騎天開萬戶宫此時趨禁闕正與故人同曉起微步出前墀東方欲曙時殘花猶帶露宿鳥忽驚枝飲酒身多病看梳髮有絲未應迂謬迹還寄省郎為直省向夕風煙迥空庭鳥雀餘塵襟還役物暝色正愁余髮有星星改名將日日疏因思郎署裏未若托吾廬寄黃時庸浙中昭代今詞客東江復此行山聞霞似色湖憶鏡為名嚴瀨千巖迥枚濤八月驚天台仍勝絶隨意暢髙情得某汝寧書南國棠為舍斯人玉作書知君思逺道猶我怨離居去住身皆客山河嵗漸除念從花下别早已樹頭疏待趙景仁不至曽許過鄰舍朝朝望至曛人應天路杳鳥復夕庭紛月迥光初滿霜清氣略聞羈心愁對此何况正思君送李子西出按宣大拂曉動危旌嚴垂指北平烽烟還未靖驄馬故遄征二鎮雄天邑千山亘石城直勞前箸借已奪右賢精萬里長城險三秋太白明雁關天上啓狐嶺雪中行斧鉞垂寒色鉦鼙壯朔聲要令沙漠外遙憚漢賢名清邊知有志慷慨赴戎行沙磧行荒塞風雲控朔方角弓彎漢月鐵騎獵邊霜萬里狼烽靖歸來凱奏長塞草鬱何豐邊塵望不窮龍沙連海上鳥道入雲中懸斧三軍肅揚旌六郡雄佇聞飛檄至他日幕南空塞上秋風邊塞上飛檄忽縱橫獨將三軍出分為四道行隂山鋒始接瀚海帳皆傾縛得名王至聲驅右北平送許亨甫以其父大司徒公命省其祖母愛子窺顔色趨庭問所思望中雲共逺階下草方滋曉日明金騎春風吹緑枝還聞臨别去遙附萬年巵送崔懋言赴順慶太守雪落朔風凄寒光逼馬嘶征途天共逺到日草方萋春色行花縣煙波下篆溪無為歎非土遙逐夜猿啼省中曉起偶有所思在公常夙夜出戶偶徘徊忽忽嚴更徹紛紛曙色開禁鐘清曉月宿露滴庭槐鳥有鳴相和人皆去不回緩步庭中倐忽悵無娛空庭步自虞本無黃綬意偶忝赤墀趨草色萋間徑鶯聲滿上都何當乘此去散髮故山隅偶從諸公走馬通惠河邊南陌苦多塵相從出水濵微風搖浦樹晴日暖洲蘋彼鳥猶求友羣鷗似狎人悠然磐石上一叟正垂綸通惠河碧水淡晴空桃花夾岸紅溪流坰畔合城闕渡頭雄浩蕩來何極蒼茫逝不窮應從御溝去長繞鳳皇宫闕左候朝清光想玉旒曙色望瀛洲鵬海蒸霞出龍池入月游南熏榮緑樹北斗掛丹樓顧忝金門籍朝朝此薄留雨晴宿雨霽丹暉髙天出翠微花如新濯錦草似偶含璣殘霧憑樓宿輕霞度闕飛鶯歌應滿樹蘭氣漸通扉同趙景仁遊邵氏郊園出郭共追尋因君諧夙心忽如金作谷兀爾石成岑徑轉青蘿曲溪流緑樹隂亭臺紛可悅今日始窺臨秋日贈友乙疾頃來思秋風忽若斯黃花開獨晚𤣥鳥去何之稍習田家苦方知靜者為多君能枉駕時復慰吾私西屏詩二首為館人葉直夫賦直夫卜居宣武坊北門對西山以西屏自號也結宇雖城市為屏乃翠微隔籬紛可望疊嶂逺相依雨後煙霞出天邊雁鶩飛一尊時對酌瀟灑似君稀勝絶城西路昨來始一過山空泉自響湖迥芰應多望極憑雲閣尋幽到石窩早知為地主好與共鳴珂秋夕王潼谷度支見訪驚鵲棲難穩飄蓬任所如昨來猶逆旅忽報有髙車庭次堪留客城隅為索居時聞話潼谷吾志亦歸歟寂寞揚雄宅惟君數見過家貧全簡率名薄共蹉跎暝色明河出秋風落木多一尊新市得清濁試如何一榻迎曛下歸軒肯夜䦨多君心尚爾為客鬢俱班露氣添新酒花香入薄餐娟娟天上月聊得共長安雨薄午炎蒸極欣看雨足垂似添池草緑應灑陌塵緇吏道聊乘暇幽襟復在茲因思故里日耕稼候東菑午日約趙景仁出郭景仁有辭因簡午日䝉恩澤彤庭既醉歸此時仍逸興相與及餘暉林壑聞多美朋曹覺近稀如何草𤣥思不暇覽芳畿馬上偶然作秋風鼓大荒萬里長空來忽然被羣木瑟瑟鳴聲哀黃葉日夜落蕙草庭中摧鴻雁號雲中蓬轉何時回顧惟仕京邑二載茲徘徊時哉豈所適拙薄成嫌猜常恐夙昔意零落隨浮埃不潔一以䝉西子猶堪哀胡為復南陌追逐相喧豗壽詩一鳥翔天中毛羽何竒哉謂從萬里崑崙道遙指三山碧海隈須臾靈駕何繽紛鳳管鸞簫翕可聞正逢結實千年日共馭為章五色雲五色雲中振羽裳千年樹畔赴霞觴玉闕金臺相照曜天文海色共青蒼其中燕喜何冲融其上龍光正鬱葱曽勞八駿陪瑶水偶值羣仙朝碧空霓旌翠蓋駐天門紫閣瓊宫絶世喧靈妃前獻南星壽玉女旁開北斗尊已經人世幾春秋鶴舞龍吟尚未休青青桂樹金波濕灼灼扶桑紫氣流忽而來兮倐而歸還于海上拂雲衣朝從東極乘初日夕息西山憩落暉遨遊八極信悠哉下見江河萬古來還將此日蟠桃宴永作夫君壽祝杯夜飲馬考功宅服采少暇日良夜暢由衷肅肅飈迤北亭亭月在東中天爛河宿清暉麗房櫳夙心期勝引晤語忽宵中昔髙蕃榻下今攝膺門崇徒倒中郎屐深愧伯牙桐歸來諒得遣慰我憂冲冲報國寺餞薛君采緣陪諸僚登毗盧閣二十四韻寶閣凌閶闔煌煌鎮帝京梵宫茲棟宇塵世俯簷楹飲餞叨羣哲追隨緣一行良辰屬景豁極眺有山晴王粲銷憂興𤣥暉撫化情如聞鈞樂發想見玉毫呈晤語應朝徹相看或籟鳴傍徨翻不愜悽惻故多嬰吐魯今深寇河湟正用兵御裘心耿耿班馬泣喤喤况復橫戈卒還餘細栁營皇靈須震疊百二此藩屏謀廟思裴令喻薪憶賈生時猶工貝錦星獨耀欃槍雞犬寰中困貂璫座上盈嫠懷常似喪渴病分無成念拙機甘息包荒德莫名濕灰悲列子肯綮感庖丁賤子公車辱同人意氣宏忘年期好我奮藻愧登瀛頓覺遊䝉盡彌憐灝氣清繁霜疏古木殘律振寒城賞倦談禪夕魂勞去客旌凄凉燕燕賦朗詠骨為驚愚谷集卷一
