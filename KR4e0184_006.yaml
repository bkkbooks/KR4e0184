body:
  text: 愚谷集巻六明李舜臣撰序送白應衡赴陜西僉憲序白子應衡將赴陜西僉憲其友李舜臣為其淹也則序之曰吾往備員考功見縣令報政者則以監司故嘗考覈取其良者請命朝廷徴令至闕以為臺諫或署其不必徴召者多以判府知州而白子實由束鹿判揚州也又給事中御史出身獨美白子再三歴始䝉今秩使其束鹿之時即入為臺或諫郎由部署積祿至于今日雖當外補豈止是哉人莫不曰白子方嚴敦諒人也束鹿之政早不遇者此其故何方嚴敦諒正其不遇者也人之情喜合而惡忤也比于食味若苦然也其竟不受若荼然也非方嚴敦諒之士有意能忤人其始則然而勢至也故皎厲之行也而或謂不可知之人也殊絶之能也而或謂謬誤之事也皎行者之與不可知殊能者之與謬誤事聲稱相去豈不逺哉誠以為人當輕重惟言之耳有在垣堵之内則垣堵之外不可知也語之曰白則信為白而實黮然黑也語之曰黑則信為黑而實皜然白也隔垣堵者𤣥素不能自呈其色披圖畫者山水不能自賞其形况以監司為名而不勝其憤疾之臆故曰所賢所不肖也賢不肖豈遂易哉謂吳干不入胡不試擊謂騏驥不致胡不試往故以忠信咎者終以忠信而榮其名以才雋忌者終以才雋而發其跡何者忠信才雋其體質也名眩而體質存故前而後可見者物之精也積而後可信者人之情也今白子雖以僉憲出豈不已信之哉送孫文宿赴四川參議序吾同年友大梁髙子業者吾往及子業吏部時而聞子業時時稱述洛陽孫文宿也文宿既補諫垣邸報中又時時得讀其書䟽遇事可否衆意文宿必有言者已報孫給事中䟽下辛夘獄興屹然廷辯果不少摧折也然則文宿非獨敢言竟以論救西安王準子推調髙平丞文宿是時名在海内海内倚重文宿復幾人哉而聞髙平命下縉紳士大夫莫不沮然若其親戚骨肉别而將逺適也忽然又若有遺愕然不自意也當是時東阿李仁元夫亦以論救文宿逮繫詔獄道路流傳山林耆舊庠序之間邑井之㑹大江南北無逺若近咸謂文宿不宜在外事不可知安得文宿能再來乎文宿既去人又時時願聞文宿在髙平者藩臬諸司郡守倅貳有能禮文宿者相與歡言并賢其人二三年矣而轉滕縣令南兵部員外郎郎中至今秩嘗聞君子信而後諫豈不謂人有是心者有是言哉杜欽谷永非不能稱說詩書激切其指而君子以為不忠以彼其心有所施也語云纖石不浮故石以質玉以理文宿名節雖百世垂何不可哉或曰文宿不當又藩參者不聞仕有階遇有時與時以制命階以存義有道者之畜也非次而希極望而得雖以富貴恥也方明天子在上公論在人一時偉然又若文宿而患不卿相哉文宿將赴四川吾特稱其立朝事君與夫向來人情共倚重者為序送李端甫赴杭州太守序端甫既舉進士為魏縣令以循良徴入為都察院經歴癸巳春謫外同知鈞州同知永平復用循良入為南户部員外郎郎中今年冬薦知杭州端甫蓋由内秩落州郡者又數年云唯庶僚體貌絶異大臣䟽逺無資藉易得罪也是以臺諫郎署復自闕廷落州縣者從古以來豈乏人哉顧雖以罪有可言者茍非缺敗不肖為人國有官箴終當録用且雖其人私心日夜何嘗不幸吾君一余察哉闕廷森邃莫可通者大臣親貴當為之言大臣又不可恃則監司者責耳大臣體國容徳為賢監司察舉忠賢為急士由是頼拔于泥塗之中效于桑榆之日遭時不然有終其身不復録者顧不悲歟誠忌其人又自委責是嘗得罪恐滋其禍則誣君上太過又何忍也不見父母于愛子乎其始䦧墻不能不怒怒亦何心當其復歡意已婉切君臣若嚴繼體之子布力之臣所賴一也人誠可用宜無棄置終其身者今觀二三年間臺諫郎署故自聖朝落州縣者豈有一人未䝉恩哉采其衆信之名察其匪他之志如端甫者雖復為郡不亦偉乎語曰勿謂無餘枝柯與株士有所待成其勲名是以下位而益脩九折而勿悔也端甫章丘世族章丘土俗獨勝他邑士多知名有如端甫及今司勳李君伯華藩參王君承晦三君子者皆吾友也端甫精嚴宜薦杭州辟如利刃何解而不可哉穿甲之弩不中鼷䑕誠非杭州無足置端甫矣送内兄伯雨先生赴松江太守序國朝既設六部又依倣部設為六科科雖視部而分官則隨事而論所謂給事中者即今諫官總名又都給事左右給事特其遷轉之次北京後建都左右者悉移置北而南惟給事中存又科止一人或二人耳若當論議之時雖有南北不分而視都左右者無異故今庶官秩薄而務專地兼而體重者惟南科爾秩乆當遷往往出當知府蓋既無都左右可待而南北又不與易吾見選法多用知府乃畿内府非素忠賢又不得也乃松江府非甚忠賢若先生者又不得也昔也天下之事無不可得而知今雖一郡之中有不可得而擅其不可得擅者則領之者與督之者互察而交持左非而右是也昔務之專今制之衆昔體之重今儀之薄諫官有司不可同耳已嘗責備故有易之以不足為已嘗清華故有薄之以不足有先生不然方謀之人所以治松江者新命賀者故常論者咸拜且謝非所當也夫不見登山乎顛而升者不能不麓而反故巖壑上下意皆適者值也步趾不虧慎也况府郡守官不卑責不薄故曰百鈞不躓無弗力也珠玉不毁無弗愛也松江之政豈不已可知哉送陳仲虛赴臨洮太守序余聞銓司繁簡之說如言府郡則首畿内次附省者次近地又次西北邉地又次西南邉地又次㝡下軍民府也以是為差等所薦人才亦務稱是曰責少則易償力能則易舉耳猶有不然夫繁簡者如言五十里不能加百里也雖皆百里山水之城不及津陸之㑹也邉地則異地形一也而輕重異焉郡務一也而難易異焉故勢莫急于奔突捍禦而民莫難于倉卒為用故鉦鼓之聞非絃誦之教神速之為非畫一之計而但以其地形小大謂當簡于内郡不亦逺乎今上詘流俗之議垂永世之規自郡縣長吏上至藩臬諸司咸務察舉而于縁邉諸郡尤不易擇守誠以戰勝者良將之功而連比者郡邑之勢格鬭者武夫之悍而輸餽者黔首之役豈非英明之上略官使之大公哉夫作室者以禦盗也堂可勿美而不可不垣之崇造舟者以濟水也飾可勿施而不可不隙之視故邉郡地形常不及者連比之勢而控制之術也其不得以簡言者捍外而休中多難而少易也仲虚嚴静有識自舉進士為建昌推以至于為主事員外郎郎中往往稱廉幹焉吾恐繁簡之說猶在人也臨洮之役或謂廷議薄仲虚也則述天子宏逺之意一時選擇之公贈其行云送張仲立赴順徳太守序皇上即位之二年是為嘉靖癸未莫盛之朝歡娯之日而吾牓進士適逢其時進士又增多方明天子在上賢才在列明經務得牓中一時多知名之士而仲立獨年最少氣最竒官拜行人不數年間致位儀制郎中部署清雅得以極意述作之間蓋于詩無不工文無不諳雖不免補外同知青州未踰年已得䝉恩而南復為户部員外郎郎中江山詞賦争雄一時鏗然者與聲合沛然者與物往也將又乗其豪俊之心遡諸羲皇之際若登名山臨四野所歴益髙而所視益下所見益逺而所企益無窮也物覈其名道原其始而不但能以其雄博之文擅名當世吾比三見而三論學三異之焉其始錯然以具既燦然以文而忽浩然不可測也今年春朝廷大明黜陟賢不肖異置百官奉職八荒鄉風于是銓司益務選舉而仲立得順徳將往之官乃吾私心獨為順徳之人幸甚賈誼有云移風易俗使天下囬心而鄉道類非俗吏之所能為也俗吏之所務在乎刀筆筐篋今夫俗吏之以刀筆筐篋無以異于儒者之以詩書禮樂而功效縣然不可類者同務而異情均人而各感也獵者臂鷹而耕負耒所操異則所施者不同吾知仲立不能為俗吏所為審矣送王潤之赴陜西僉憲序孔子貴先進者豈不以其厚重之器敦實之才能維持人國哉我朝人文至𢎞治間益美士有詞翰流傳至今或用能名所遇輒得大臣為國兼采之耳舊徳純人終多在顯然視國初時人才不可同矣武皇之世時事又異夫其忌事而勿成飾顔而謝謗者視𢎞治間人才不可同矣當是時上下猶所賴者喜聲名矣讒忌則攻貴顯仕矣趨競則攻臺諫論薦則賢鄉里奬進則攻銓司除調則賢大臣門客則攻是故茍先為言雖始無心不敢知也非分所得强而授人不敢當也故曰天下治亂視風俗是時奠安獨以士習未大失耳數年以來時事又異夫其不肖而為賢競進而無恐者視正徳間人才顧又逺矣皇上赫然洞察于是遂用言者停罷一二大臣端人逐客始䝉美調潤之擢陜西僉憲其一也今夫縉紳之間豈嘗薄人聲名不貴有才美哉而必敦實厚重之云誠以厚重之器不易予奪敦實之才不知進取士忌躁進與可奪耳才美則易染敝繒者易售采枯棟者易觀士名賢才大臣務私所好其不傾人國者寡矣潤之丙戌進士歴内鄉泰興槀城令廉明不售而為南部雅重而為人清脩而在位者又三年矣詩不云乎于以采蘩于沼于沚士非遇時能自致哉嗟乎嗟乎送張常徳序張子滿户部秩出而領郡得湖廣之常徳有惜之者曰張子萊之平度人也平度濱海東北而極西南望常徳何啻數千里哉逺身南域一也澤國卑濕二也此論其細若言為政則吏之治與方之宜江南北不可同也秦人而游越人而騎駭于非常見聞而疑于剛柔所用三也此皆非也仕宦有南北偶人所值者耳吏治豈然馳陸之車又可縁谷御者適也渡河之楫又可遡漢操者利也太上以徳其次以意意生于形形生于始事莫不觀乎始不見張子為清苑乎而清苑治為廣平乎廣平又治為南度支乎南度支又治清苑猶為縣也廣平猶為郡也度支則大司徒部縣不可同于郡郡不可同于部而張子視部如郡視郡如縣然則今往雖江之南豈不在指顧哉又昔令也而今守也昔貳也而今專也昔内也而今外也故曰乘髙易視操刀易割今夫朝廷用人其有不易畀者非困苦之蓋才之也其有數千里適者非置逺之又藉之也器用利者無難而不為易希願薄者無寡而不為多張子確乎為人泊然其思者也如或所慮即若文翁蜀郡郭振安西去今常徳豈不又數千里哉以告某某咸信若是曰曷不遂為張子贈乎送王道思省覲還晉江序晉江王道思既舉進士為吏部員外郎用是䝉恩封其尊翁方渠先生奉直大夫如其官級今以督學取道還過里閭歸自數千里外别又數年丹顔廌服入門一堂望見父母誠一時之至榮生人之極遂矣吾因以見人生子其有貴賤賢不肖者豈不懸絶哉故雖甚愚願子則貴雖為不善責子則賢故自其始為諸生青衿廩食翺翔郡邑之間此何足異已為之怡然獨喜自負况當擢于藩省之科寵以鹿鳴之雅又特薦藩省耳未顯盛也猶為之擊牛豕吹笙竽徴召宗戚飲食燕樂况舉進士為天子之人進士一也齒有長少值有早暮在其父母意皆得也懽極而不自知忽然而不自意况當是時道思獨在弱冠且今進士科豈乏人哉未必人人賢有憂其禍敗于先哀其莫救于後為人之子而無以慰髙堂之思厚平生之奉顧為不善使憂且辱親未必榮已為相累而道思卓然在今之世且如視解司封郎中若細物也夫其辯忤合之途一卑髙之勢究感慨之志薄趨競之為此其中豈有能奪者哉文足以興名足以垂行足以示又早聞道其超然悟者不可以指喻也其淵然蓄者不可以測知也夫以名徳大儒為之後人先生所得多矣雖一再封要非極願茂樹知榦視榦知根積而隆發而至有如先生者哉送京兆陳公晉副都御史鎮河西序余考功時聞西蜀介泉陳公當是時人莫不公聞者余乃幸而聞公余江西僉事入為南司業也蓋來無何而公薦參江西省事己亥冬則福建左使拜應天尹而余謬而為丞余乃幸而見公始余之見公也見公之威儀而心山岳乎公聴公之言議而心河漢乎公佐公之為政而心神明乎公夫人我貴而人賤也人尺我寸即負不勝務贏其寸而毫末反等人尺見公不然博者其外虚者其中精者其義穆者其言辯者其治徳者其人故曰刑者生人之命也而每惻然于獄之情吁嗟其㝠不肖應天治八縣上元江寧近在闕廷之下國之初試因其近而取給焉朝廷既北百五十餘年所取給者猶在毋貸至于今則十七八乆所不必取者務取給焉民無寧歲月縣長貳吏無寧日公言尹難哉尹難哉如當取給上元江寧民者吾欲舉而置之而事期㑹濟也吾徒約而施之而病十八在也吾恐闕于事也即民病者十七八焉且上安知此如某猶舊某純非舊非一一聞之朝豈可復俟三四年哉公亟有意為上元江寧圖所以聞治中隴郡閻君通判吉水張君推官潁川胡君一時才賢而公聰明裁之于上三君子者所領清戎錢穀獄訟各遂厥長緩公歲月治應天者將赫然乎而遷今去特徴所志勵我在之人焉送楊給事赴湖廣僉事序書太甲曰先王顧諟天之明命顧本訓回首也人試回首有在其後當敬毋肆况天之明命乎言常畏天常如天嚴監其後者攴為敬人自敕而復從攴攴人所以擊也攴然後故攴為敬攴已為改上徳大賢飭躬敏徳其次中人自有五刑豈非復為中人以下設哉記曰刑不上大夫糾察之司所由設也以名其過為懲列下其人為辱故刑有所不施而官有所不廢漢制丞相御史等重而外監察御史州一已專設官所謂刺史後仍刺史或曰巡察觀察按察廉訪皆以使名明仍按察其官則使副使僉事制曰在内從監察御史在外從按察司糾舉言在外者布政使以下是已今天下省十有三而省三道多或四道道惟分巡僉事可言僉事佩印參政無佩印也假之印者豈非事輒得上聞哉則郡五品而上分巡輒得論覈自有巡撫巡按糾察于外分巡獨有理刑一事况雖理刑而不專斷參政行郡其名分守事或獨闗分守有所不聞然布政司寮三年滿其人賢不肖今猶從按察使考定此其遺指可徴也已法莫不有始失法始意莫如今按察司正徳中浙江僉事朝邑韓君糾覈一郡太守郡太守竟罷去豈非故事有當然哉君今官給諌所謂大丈夫者於古人奚愧哉吾何以為贈也送户部員外郎艾君赴浙江僉事序按察司稱憲豈不以其縣法示人者哉而憲敏也言敏當如人去疾然務去之乎疾有必攻法有必至洪範五行水曰潤下法猶水也自上而行古今論難易者莫如田肯肯之言曰髙屋之上建瓴水也今按察司行法于外其順之易奚啻髙屋之上建瓴水哉而法滋不行者試求其故記曰飲玉爵者弗揮玉非用之之患而操之者難也玉而操之玉長為玉法而柄之法長為法刃理則入節則躍削則衣法亦有理今夫法所加者人也加人而人不勝其一旦憤然我矣其鄉之人豈盡憤然我乎即令其鄉之人所與為之憤然然視所加法者其人之情緩切卒漸亦有間矣而况方各屬絶者乎憤者之私終不掩其歌者之徳聴者之惑終不勝其厭者之心夫毁人者其始有所不堪是人毁也然無所愛是人亦毁人不能人人使愛自人之有顧忌之心而後法失毋至法失而毁滋來故當法而毁毁有時明失法而毁毁無時解自余金陵聞見海内名徳言剛大者必大司徒部米脂艾君君薦浙江僉事且行浙江今首省也庶艾君者其當是乎四經讀自序余年十二三時先大夫議所讀經憶為三字入覆皿中黙禱于庭曰易詩書惟吾所當為手焚香探得書字余蓋用書叨舉進士又十餘年始因注䟽讀易詩書而何薄訓故者等之技乎爾雅何一人作其所從來乆矣而爾雅薄以為未足據耶不免求之于增廣韻若是又失奚啻十七八哉今誠于文不得不訓故者莫如爾雅一書毋令廢矣詩序何一人作其首一言如所謂闗雎后妃之徳也者安可易也晩讀春秋竊以三傳無如左氏者焉易卦辱言自序唐初考定易注惟存王輔嗣易迨宋伊川先生傳晦菴先生本義晩出然輔嗣易與伊川先生亦相足也吉凶悔吝輔嗣曰吉善也吝羞也輔嗣或曰吝恨辱也自餘三家無不有得于易今吾卦數言存豈不辱哉而自不可已者勉吾于易讀也卦各一首明夷五首詩序考自序余讀詩序以為其始一言而已餘蓋如傳後人所述知者不應作者自為釋也自説詩者以為固有毛髮是矜舎形察影為詩十二三晦而豈序之過哉序之作誰竊以約其辭而含情因其時而辨禮非聖人之徒不及也而欲并捐徒以讀詩能乎毛詩出比自序詩有六義唯三曰比四曰興者義難言也何也朱所謂比毛之所謂興也而毛寓比于興夫既曰比曰興義宜有别嘗考之興之言象也事存于物之中比之言類也事而與物偕舉若是毛所謂興聖人復生豈可易哉惟不出比以興該之漏于是矣又以詩多引古以風比義也何也物情與事偶似其形古人與今或異其趨于是有引古以風今有出物以質事二者皆比義也然引古以風今者多以通篇出物以質事者篇數語爾尚大君子裁焉禮經讀自序余讀冠禮筮于庿門釋者曰庿古文廟字也蓋十七篇本古文爾而承秦𨽻至于今日則多俗筆甲乙或易如昏禮下達納采用鴈納本補紩而鴈鵞也酢酸漿也讀酬醋之醋豈不逺哉不揣余陋隨所讀舛正以大篆用其邉旁以為楷書庶身無苦終成余志周禮戴記兼正之焉春秋左傳考例自序孔子之作春秋至矣而何說者索其言于例乎蓋方之天茍求其故何也言之于物如為之形迨其有形物可諦視是故寸短則尺長此善則彼惡春秋所以有例爾然又有非左氏所及至杜而始見者亦通曰例能不失其指不必親左氏出可矣故曰周禮盡在魯矣敢以周禮為先京師次之二者春秋所由作也穀梁三例自序三者時月日也自穀梁氏與公羊氏之說春秋皆以時月日起例然辟之織穀梁氏為益精爾夫日詳于月月詳于時今考之經其或日者果非無以是故或例時而月或例月而日毫忽之察信非如穀梁氏其孰能與于此故曰于彼乎于此乎是以并考載焉左傳讀自序孟子曰詩亡然後春秋作詩亡者雅亡也而風自邶作者尚多隱公以來然則風未亡爾小序可徵吾往讀詩因考之左氏傳遂讀左氏傳不輟丁戊己庚四歲畢巻頗存所得總若干條三經考自序三者易詩書也方春謝客憶去年冬晝硯寒澁惟及已午二辰負聴事坐面南日中計字疾畫庭隂已合寒沍今歸硯和筆柔爰取三經正其舛文如昨讀儀禮者詩不云乎且以永日余規亦止寄情斯也癸夘春正月序古文考自序六經本古文爾秦火以降迨于許氏説文之時古文存者十不能得一而鄭康成儀禮注其頗稱某古文某者以質之説文所出古文亦多闕賴而説文存者敢輯以為六經古文往彼既曰古文某爾易詩書儀周禮各若干字籀文考自序自古文降而為大篆周宣王時史籀所為也其去古文猶如扆之于家益降而為小篆陳矣今説文中反雜以𨽻而或稱某籀文某則許氏筆以别于本所存乃其本所存古耶斯耶不可知矣余考古文以讀六經因及于籀以其為廣古文而作至于于古或異者焉易詩書儀周禮各若干字六經直音自序昔齊桓公與管仲謀伐莒臺上而或以其吁而不吟測知為莒夫吁吟者徴羽之義也吾青自䝉劉石之難風俗淪陷百有餘嵗宋以來至今土人語音相雜譬之永嘉南渡則王謝諸賢俱半􅋵越音余讀詩至瓠葉有兎斯首釋者曰斯白也曰齊魯間呼斯鮮聲相近此方言也亦并澌盡遭逢聖代師崇經術釋文明存而人貫于譌舛如素䝉緇不易反復加以土音偏重不能為入聲讀反不如山僧里童子師能引聲諷所謂廿四攝者又徒能諷而已余故于經文究其反切而為直音不免近俗然以名是不可易也壬寅冬十月序讀史自序余考功時頗讀史記西漢書迨叨南司業則史記漢書遼金史皆新刊宋史廣東刋也徴板亦在始備廿有一端今可使徒積哉此不過以五六年畢讀天乎當余假也癸夘春三月序王户部關約序歙程生者為言其師王子以大司徒部監臨清鈔闗無不能革其故何也于是出其治闗之詳一帙余讀之是自持以嚴而人嚴之法所由行也夫本舟車之際物無不有故為之闗十一而𣙜以佐國需監以部賢蒞以明法然而不免敝者利之所在無不欲得之也猶當晝持弓刃覆人于路有其資豈不知盗法死乎而為之矣今特出其一時之捷乘官之間而詐商人于其新至其為目競心狎不難也不自意即敗亦法不至死况未必敗而日華屋鮮衣出入優乎卒以監者反為商怨所歸而利實為之攫由是諸闗不足為國賴也乆矣王子今約其大者莫如鈔直故正數外滋有二端一曰堂例以供監者而王子于是苴如視也其一吏徒例若是雖奸胥黠輿豈敢復意及哉故曰正曲為直而或徒以有繩于人能無辭乎卒歲所省商金萬有竒多矣且令是為虧國課而施不忍于商不為可矣而正課計未嘗有減于往乃自為減又為闗增鈔且百萬豈不當然哉故能為商省闗單金八千矣省豪奪金萬矣省小稅錢百萬矣所謂亦禁諸猾有所不得而商輸官有常也不然萬計者豈復為商有乃徒以為奸利者費其孰徳之觀此王子是政雖以佐治天下可矣邑志自序邑故有志讀者莫不曰踈何也莫大如縣名而以邑在西漢為樂安逺矣梁鱣齊人也縣特其封邑漢太守陳蕃所禮周璆臨濟人三國國淵蓋人皆援以入邑齊桓公之為諸侯盟主乆矣其盟在可稽實未言往一壇吾域是今何許豈不以地僻于臨淄道迂于諸侯乎而曰桓臺為公嘗盟諸侯乎是諸如是者今并知其不然矣官有賢不肖其姓名當俱存乃自國初至作志時百餘年間知縣裁九人丞以下至訓導各一而已元程鵬者徒能數百金直施爾齒于人物之倫夫邑本漢千乘縣也地割于廣饒故言乎隋以前千乘與樂安其實易以淆言乎隋以後千乘于廣饒其地乍不辨水經淄水注曰淄水又東北逕廣饒縣故城南言故有新也今城北廿里外有故城址或是酈道元之時廣饒見城然又未知為千乘歟則又未知為樂安歟志闕于昔故跡不著于兹非一日矣漢千乘者河所從以入于海也今邑濟所從以入于海也夫濟四瀆之一也而于邑焉出豈不足言乎人才之生其在于漢可矣迨入廣饒迄于有元又何其不易得也遭逢聖代鄉吾前行多以徳終士莫不知向學蓋滋剥之數焉邑令邢臺王子以乙巳春至忽覽故志慨然曰闕遂以謀之余余故為校集其諸川流質之水經而邑始末徴以漢等志尚諸君子其余正之贈吾邑庠何先生赴海州序先生以嘉靖乙未來典吾邑庠教而吾丁酉春還自金陵往始見先生者能勿洒然吾自失哉已參其語讀其文以吾獨所傾心測先生内何所非其有哉當是時先生裁四十年然而稽其不可少遲于銓曰家無以為禄其親大人耳今典教禄可知也歲四十金必謹其半遣上其親大人臨舍當遣先期數日無非戚如在顔色諸生望其色戚如也曰是復遣人于其親大人乎當念其親大人輒下泣知者請間浮闕可察也若是可謂不言而喻矣吾罷官以來頗得交于庠數君子稱賢者焉漢文唐詩而程朱㫖然而莫不孝敬于其父兄宗族而信且義于邑今二載矣自吾未聞其稱邑令丞誰氏况其治邑自吾未聞其有微及里俗事豈不賢哉吾邑自入我明垂二百載方䝉聖化而數君子錯然茂于今日言者庠入我明莫如先生造人今兹日也先生願隙地可築宫依古堂室之度制器備樂庶禮所謂鄉飲酒與射而邑值未遑也今赴海州先生當遂别諸生徐君孔卓以下咸不忍先生行吾不能狀先生然觀諸所不忍徴難也已送吾青潘守考績北上序婺源潘君之守吾青三年于此矣以今春二月考績詣闕吾邑郭尹言余有以贈厥行者顧余何足以為贈乎試言之往者新城青沙泊溢水其邑之議將遂驅之使東北下即髙苑博興樂安為水居矣君視水則以孝婦水决于長山横流入青沙泊復出而為彼中難也曰小人哉新城令也不圖可成之功而欲以連邑之人為魚乎言其狀撫臺但下長山縣補隄而已觀此君所以治吾青可言矣退殘吏禮文儒直抑情表堅節急荒儲興委習方今天下四垂不警忠賢在位聖人南面垂衣選良為郡屬以蒼生而吾青乃得君吳公在河南文翁在蜀無以加也功賢如此可以獻天子矣送吾邑侯王先生考績北上序國家給事中御史之選嚴矣皆察以進士博士行人推官知縣諸良而為推官知縣所得十六今上御極以來罷進士不直以授給事中御史而給事中御史為推官知縣所得十八然博士行人寡得而易推官知縣多得而難其尤莫如知縣難者推官郡一知縣多且劇爾夫錢穀以時入而闕于民之亡獄辭以法决而疑于客之屬故還其亡匪徒以足錢穀惠可徴矣辭于屬匪徒以平獄辭威可立矣于是用其威以伏暴而禁邪引其惠以滋農而興化故曰廢者興之資也下者髙之負也不知何時始或曰辛丑壬寅間矣邑民以亡莫不于侯水如歸焉君子格奸或嚴于辭或嚴于色侯可謂嚴于色非歟今三年矣而侯為人賢者所欽不賢者以却勿言吾青即聴于東諸邑法之平有如吾邑者乎法之行有如吾邑者乎侯誠能行其法于是侯佐來言所以贈侯考績行者惟今給事中御史之選豈不以諷議哉而多得于素剛有植之士侯良其人邑之民則不忍于侯兹行豈不惜哉送司訓稽君赴保定掌教序君來司吾邑庠訓也值所托舍向廢至夏秋間雨作夜榻亟徙而無少阻見于色也俟冬但出已俸修葺不以煩官兹事若細然充君志何往而非其安土哉本治毛詩兼通三禮諸生專受教者十有七八成才獨多師道有嚴然與人居則多和理惟曰事當然爾至于其所不當然者確乎在也暇惟閉關讀書彈琴今六七年于此矣而未嘗一日不思其母太夫人言及母太夫人輒下泣今擢保定君下泣曰吾當益西北行不能南覲于母何其酷也謂宜有贈者詩不云乎畏此簡書君其勉從王程以禄于太夫人可矣賀邑侯郭先生見褒序吾邑里習之敝舊矣而大梁郭君以去年冬蒞政今五閲月試言其大則故以力相足詐相成者莫不遲却于君之顔色而震讋乎君之裁斷静其恣有不為柔其豪有不出故曰一夫得情千室鳴絃而况四域之内相與歡負者乎夫禮教也威罰也譬之治玉威罰于禮教其猶錯乎君則威有所當加也罰有所必至也穆外而邃中莊容而約辭𢎞體而密理廉胥而嚴庭夫鼓吹以警途選騎以擁後今之官府自為衞且適者以有行也君于是薄不為也自君之至邑也君寮未聞有稱一觴安事君者况羅鮮肥吹笙竽以遊宴于外乎古今書可謂無不讀矣披閲巻政間不虚先是御史滿還闕于賢守令必有所禮而君為巡按傅子褒勸君寮莫不言當有以賀君竊以化理如此終被徴書任寄諷議試賴荒城備厥名履以君器業茂美臺史之賢豈不並可見哉賀郡寮馮君見褒序嘉靖丙午冬吾邑王長北當入覲太守潘公儀攝邑者莫如幕寮馮君而邑以不年國賦有闕吏言君當趣稅者君曰雨雪如此民寒且饑吾尚未知所以撫視而可更鞭撻之使畢亡乎民知君無趣稅意安居矣有無賴兒數十乘邑長出相與為期且刼某氏君察知其姓名忽然于坐若漏言者曰某某今為盗矣由是諸兒驚伏于君以為如神不敢發常以夜人定後自出行城市里有戢無復博徒若酗而况于為盗乎故終君在邑百里之内無毫髪損覽訟若細即遣之曰是不可以已乎必干人理然後逮訊有當于法雖豪必懲茍非其情無一不出故事獄成則令訟者自出楮直而君于是寸楮握粟無所責也寡婦當表者三皆諸生之母也君為之扁且禮其廬聞其為具即不往又三四日報馮公來上其堂見其子弟而已曰吾不敢于巷飲一也而不可使貞婦厨有煩費二也西堦故屋三楹所謂讀書舍者君夜所托宿也土床瓦盂晨夕再炊而已隆冬雖寒無杯酒之適明習吏事飾以儒術案牘滿前手自裁定清嚴有性至于用法無非平允所以三月在邑而至于今為民所不忍則在郡者可知也已于是潘公薦之御史臺党公而君遂為御史臺所褒奨某某里賢族也問所以賀君者竊以潘公今名太守党公名御史而君見知二公豈易得哉送邑侯郭君入覲序水經淄水注淄水又東北入馬車瀆亂流東北逕琅槐縣故城南馬車瀆者鉅定湖也若是吾邑自北門外竟域實兼廣饒鉅定琅槐三縣地矣琅槐鉅定迨東漢初已不見當以海潮所落土性不復廢至于今廣饒亦廢乃吾邑故其故城在今城北又自故城以北竟域百里間漸西于海多宜木棉而并以瀉稱者水泉有質故也然未嘗殘以潮故多可治何也周禮草人之職瀉鹵用貆本非專言濱海之地而已抑詩有之原隰裒矣信哉吾城直北與頗東北至海地且有差而邑侯大梁郭君以去年至邑為躬行田于是東北至馬車瀆歴琅槐故鄉益東北至馬井城益又並海東北至皮丘沈已循支脈溝西南至博昌里已南至廣饒故城度泲登桓公臺反復縣涉旬矣宣行三四百里終得土詳以為賦凖乃不難為海曲之行夫自今年春三月不雨至于夏五月麥十八槁逺近吁嗟當是之時孰非勤雨者乎且百日矣常脫粟飯一再舉亟賑于邑賴而全濟數千人里黠有嚴訟平暴熄禮教方興君將北上朝明年春正月朔先是撫臺䟽君政績聞于朝廷竊以堯舜在上有臣如此如被顯褒以觀天下休矣哉兹行乎某某咸謂是言可以為君贈者請書之云彭太宜人八十壽序靈寳彭君之來佐吾青也太宜人迎在養今年春二月壽登八袠君僚良為君慶乃張子冀子使吿余曰彭君之孝太宜人之賢且壽豈不備哉何也君以未明興詣太宜人寢問安始出視事晨曛當食躬上太宜人食時果春鮮非嘗以御太宜人食不食也五六年矣而盛服侍太宜人如一日日所裁事暮入為太宜人陳說太宜人常以君所裁事無弗善者為君益酌加餐君亦常以太宜人益酌加餐徴所裁事無弗善也君治青龔黄不逾也然豈不有端乎先是君滿三年績得為太宜人請誥榮矣又壽且康且孰非人子乎而得備養若是抑太宜人恭徳多覽識用佐君先大夫為名太守今復閲君在青方聰耳而明目安食而和履豈易得哉請為太宜人壽余乃益知太宜人賢且壽也始余知君治青可謂無不可為若是優也然精于理質以經義體以憲章通以物情無弗至也于是乎有法家所未及窮積歲所未及次而以一言剖可謂無不可伏然薄鞭撻不為也故曰敬親者不敢慢于人故能不忍于民而不至有少闕于事君之先為隰郡守也隰之治以異等稱用薦來青將又由青薦歴顯位太宜人壽矣榮矣將又以君加受崇封于太宜人之徳豈不盛哉是為序王太夫人壽序博興尹王君今洪洞名家云君之先西藍公為魚臺令冦難之後求所以安當食麾食若是專也視事五日而終于官是時君母太夫人年裁廿有四爾自此深居持閫以内事賢舅姑然後舅姑相繼而逝極力營送無毛髪闕始君生四歲矣至嘉靖甲午薦于山西丁未登進士第來尹博興遭逢聖世道化四浹孝子貞婦無隠不出而况名節如太夫人有司以上䝉覽堅白建表于門題曰節婦孔氏君之來博興也奉太夫人俱東今年某月壽六十有四君子以是謂太夫人有子君能為太夫人報而亦咸能報西藍公于九原下抑太夫人往及君嬰弱之辰廓然一室春秋蠶織常以夜分而還入寢二十年内三任大事何其悲也而蒞于君今在望邑身被顯命作範我明晨興承顔温其慈仁子拜于前孫拜于後又何其安也豈不見天道哉博興吾際邑也輒得見君詩不云乎如金如錫如圭如璧博興之治以徳化稱有以也國家重臺諫之選常十七八得之賢良縣令况復如君由此言之君所以為太夫人壽且無涯兼榮備懿慶矣哉為張生報徳蔡先生序張生四維二歲而孤早自彊志迨于冠年邑選雋才器于今尹大梁郭君乃所試文莫不見者異等不已督學臺以補諸生備昨己酉省試而生病腹塊未能行歴冬以至今春塊日以甚其師賈偕之見蔡先生問誰氏子先生惻然曰吾不關人疾痾乆矣今可使君衡不安于地下乎君衡者生之考甫先生客也生留先生許三月入藥三四十劑塊釋然矣于是里人為生幸而歸先生之識神等雖然先生每晨興出生切其脈循其塊知損幾何問朝食未若是勤也村辟有園勝于邑中方夏亭上名花映合滋蘭茂竹啼鳥六辰或命酌酒以飲于生涉經若史輒千餘言觀此先生之已生疾藥而已乎往先生領邯鄲丞不為也歸來十年晝户常閉彈琴賦詩而已泊中堅履諸賢令長必過相問延之往又不得而輸功徳于生若是生謁余言生我者父母活我者公余喜其愈而為之言庶報于先生傳子及孫俾永觀此君衡亦吾客云王太夫人壽序博興尹王君母太夫人今年六十有四乃士君子來謁予言為之壽者惟太夫人貞履詩書所稱何以逾哉如是而壽君益能為之壽何也愚覽古賢母未嘗不視子哲有稱為適不則為虞而君邑蹟為東土冠其大者濬濟平洲至利出田數萬畝倉有施粟萬口所仰而為春炊是故茍為民暴雖細必懲少干以私雖豪不入是故轉徙還者貧弱恃者屈抑直者饑寒存者何限哉宜無不父稱君而愛君者愛其人存其樹而况聞太夫人宜無不為太夫人壽太夫人族孔氏嘉靖丙午洪洞表節婦者厚厥嗣人施于博興於赫我明多良有司而君存焉賢母哉愚谷集巻六
