body:
  text: 愚谷集卷九明李舜臣撰碑表祭文中憲大夫山西按察司副使東溟程公墓表碑程公既卒于易乃郎舉人鳴伊吾壻也奔赴于易奉迎其喪以歸遂乞銘于提督四夷館太常寺少卿安德盧君將葬也乃復伐石而礱之將刻其大事以示罔極舉人以謂余曰兹事也翁其圖之何則知吾父者莫如翁也按志東溟諱紳字伯書東溟其别號也世為青州樂安人生居南坊一世曰勝二世曰恕三世曰琮俱隱操不仕四世曰玉仕為真定縣丞配祝氏以𢎞治甲子九月十六日生東溟東溟生有異質未毁齒巳孝敬如成人長而懋學能文嘉靖丁酉領山東鄉薦明年戊戌舉進士迎母京邸以父不逮養為恨已亥除知山西長治縣事㑹長治旱甚東溟行禱雨城南歸未及城雨大作百姓歡呼歲則大熟壬寅擢為刑部陜西司主事斷獄必以情罪疑者雖詔獄亦與平反大司冦聞公深器之三年奏最得贈父如其官母封安人適陜西榆林兵備缺銓司以東溟名上詔以陜西按察司僉事往蒞之懲債帥剔宿蠧軍餉用饒所有羡餘二千餘金盡令貯庫以資犒賞無何丁祝安人憂歸督撫楊公薦有真誠為國恐難其繼之語居喪哀毁欲絶勉廬墓側理封樹為其父建贈君坊至傾囊不吝起復補河南僉事首令有司立社倉練鄉兵一一自校閲大盜李邦珍亂中州河洛洶洶獨所屬二十餘處賴以無事壬子大饑出社倉粟奚啻數萬計又因汝水開惠民渠利被數縣靈寶有巨獄久不決東溟一訊而釋者千人于是撫按交薦為異等癸丑遷山西布政司參議守河東道蒲州城西逼黃河河侵勢甚危東溟亟築之數月告成事蒲人誦其德以為萬世永賴者焉蒲俗競侈靡婚葬非大備不舉往往暴露廢室家申嚴禁約月餘襄葬合子女者數千家舊藩參不與戎務巡撫王公謂間戎務孰如東溟因檄守要害賊畏威不敢犯守城堡二十餘處悉為保全伏兵芟首級一十九顆邊將戍卒咸以韓范稱之人為之立生祠歲時奉祀廷議嘉其功于是東溟晉山西按察司副使奉敕總理紫荆等關保定等處地方兵備蓋將大用之也先是東溟防秋山西勞極病矣兹復念紫荆畿輔重鎮日夜營戰守具務在萬全廢寢食者久之忽痰作不救嗚呼若東溟謂鞠躬盡瘁斃而後巳非耶東溟生于𢎞治甲子九月十六日卒于嘉靖乙卯七月十九日配蔣氏處士蔣淵女在室以靜惠聞年二十適東溟姑老而孀謹事如嚴父服食必致精潔非其手出不敢進朝夕慰藉未嘗頃刻去左右處姊姒和而有禮東溟早登第為名大夫相力居多生𢎞治乙丑九月九日卒嘉靖癸已正月十八日得春秋二十九贈安人繼配崔氏封安人子四長鳴洛先東溟卒娶庠生韓卿女次鳴伊鳴南鳴髙鳴伊山東壬子舉人娶吾女鳴洛鳴伊俱蔣出鳴南鳴髙俱崔出女二俱幼未聘孫女二長聘鄒平省元陳其藴子更次許胄元蔣永築子竒鋐鳴伊女也兹以嘉靖丙辰三月十三日合蔣安人葬于城西祖塋之次謹撰其大者刻在墓道以告勿毁新建丁君配熊氏墓表碑夫人姓熊氏故新建丁君諱某之配也丁君始習舉子業巳反田中力農積穀成乎富家常以荒年施粟夫人則督為麋食行餓者列釡十餘而辦挹取嘗其剛柔有不至即數之曰彼非人乎敢以是相食能任爾後不為彼耶姑程太夫人卒勺飲不入口者七日士君子之行不過也為子納程氏女嚴而有恩自飯多蔬足為金綺非其好也丁君先夫人卒數年卒持其家以畀子某至某次子以忠登嘉靖戊戌進士仕為刑部主事員外郎郎中知河間府晉官山東按察司副使建牙臨清以狀言余追表其大母墓者按狀夫人卒于正德丁丑距生正統丁丑享年六十有一合葬丁君墓隆安山矣子男一即某贈承德郎刑部廣東司主事孫男二某某余惟往者警備環城臨清今為重鎮內拱京師若是監兵憲臣當求其才不耶而去年冬得請于上以命以忠良以嘗歷刑曹稱為清嚴載典名郡通乎威慈辟之利刃無弗入也將陟崇階受顯命贈其先大父母父母于夫人之德豈不盛哉同年鄭師周尊翁祭文公始知名宰府所器公志豈然遭時乃忌惟公有才如劍既脫當其吐精人目為奪如是則賢適為公咎讒說茍行忘彼為醜公用奮衣渡江而南蓬門隱約鼎食匪甘維天垂象雖往多志蓋數千年言人人異卜筮吉凶匪探孰知醫茍活人尤公有意備美公身發于令嗣令嗣忠賢今皇入侍公親視成歡然始遂豸服從容鹿車所至列館名山晚多樂事某等皆癸未歲令嗣同入自來金陵年家有集世務俗情公談不及方共歎慕威儀遽戢嗚呼哀哉憲伯徒跣武昌來奔冬十一月卜公南原相與送公薦此芳尊同年王誠甫尊翁祭文惟公世家令子誠甫自歲癸未都門為伍時公在嚴榮名共羡公後澤州倉卒事變冦難既平誰功足紀衆多公歸摧折伊始公後懷慶誠甫同時俱從宰府來參度支度支匪薄誠甫則怡余亦年餘叨承在兹誠甫純孝思公有詩每讀是詩歎公父子前輝後承在潼關趾公後召入黃岡王君字稚和者徴余為文余不能文無用贈公祇言不辱昔在賊中公後金陵余從賓末上堂見公公才宏達凛色雄姿宜往莫奪復用廉平往僉憲晉道出鄴中誠甫在覲事誠何常公履則順一疾郡齊清漳反櫬嗚呼哀哉誠甫為子固多大節義關友朋每獨所切世人趨時茍可為恱不惜傾賢言豫薄劣誠甫時相傷此道闕朝為良朋夕交則絶誠甫憐余曷其有極無所報公幸見顔色香帛遙將西向為惻同年李元夫尊堂祭文有婉孺人自公既卒竟成令子官為補闕懿兹補闕昔在立朝忠誠見録賢母曩操孺人等封令子在顯瑣闥輝映禁庭游衍遭時聖明言者多遂歸奉母歡入參廷議歲時珍羞上方有賜南果雜陳吳粳為食令子偉然固人所忌用出澶淵漢陽有至皆奉孺人忍須臾離今嵗戊戌漸還逐士肅肅賜舍煌煌京里孺人壽康令子益美一夕攀號詎擬如是嗚呼哀哉人孰無母祿養或難鼎食共具有不視棺斂形手足躬親則安母德令終閫儀既飭八袠享齡福今為極獨憐令子毁瘁顔色扶柩歸葬南和公域某等年家一時金陵偶值蓋六七人令子又北令子名流益光母則嘉蔬清尊來上朝食同年馬光漙尊堂祭文昔歲巳卯武皇之季同舉吾鄉得如令嗣蓋人皆賢七十有五令嗣儼然衆尤所主維時秋杪嘉燕既敦相與再拜約為弟昆論年少長令嗣草二人父若母推德所自司徒我公安人是宜後皆數年拜于京師婉婉安人家用有儀煌煌令嗣才名四馳無何以薦公守居鄴令嗣涉漳亦往卒業伊初同升比若鱗次逢遇何常後頗難易人亦有言本同末異有總大藩有命未寄今年外內裁六七人齒髮多變懷各歡辛令嗣獨美髙堂有親俱及仕宦清華之辰何遽攀號訃聞而哭令嗣喪母呼天余毒噭噭奔還赫赫南陸人并為公惜此肅穆嗚呼哀哉安人世族令父憲伯公歸以來佐官所宅操履一時并褒在昔是為安人命服有翟光漙為子不必已益仕今巳榮終當偉奕不可少留忽往安適令嗣終朝拊心向客且父山中誰齒俱百孰非孝思念獨此迫嗚呼哀哉祭故户部尚書九峯孫公文代作嗚呼孫公夷夏之望一夕星隕忽報公亡公雖在野如川無梁明明日月為慘精光公始遭遇昔舉銓司知人則哲惟公在兹孝皇之世賢才一時實惟公等平衡是持文章至是其變漸衰儲喬始奮何李追隨公實雅量崇而進之有位感勵或者能為巳復引拔常若後期郁郁乎文既興若斯至今作者猶公是資雖公是資退若弗足巖巖宰府後公為副值時艱危人如在木蠢彼殘夫肆其荼毒嗟此縉紳逢其窘束或不自持望塵俯伏公本名流肯同薄俗志不少辱官竟南遷如彼鶴鳴聲聞于天一朝雄斷取其凶愆方以司徒召公南還雖則召還時事猶未未及用公公竟辭貴國則無人典刑殆既武皇之末言之可畏黃河載清聖人既生自在藩邸巳薦休聲復以廷議徴公地卿時方民力困極靡贏實賴休息連年勿征公本舊德樹立益宏既瞻百宷亦慰羣情忽然引去十年在荆海內庶幾猶為蒼生如何昊天既喪老成嗚呼哀哉江漢滔滔流而不息矧彼衡山雄于南域鍾為哲人實民之則公外間間而中抑抑無義不精無施不克逮事四朝榮寵亦極宜稱耆儒為世名德太上有德其次有言言則可逺而德則尊惟忠惟敬惟志之敦食無重味郭無名園古稱大臣徴乎進退進則康時退無患悔惟公裁之咸義所在遺範斯存永世不廢訃聞在僚能無感慨薄奠逺將如公在對鳴呼哀哉户部員外郎王志達母祭文有淑其儀是為匹美既賢足聞有子復爾婉婉宜人忽疾忘起泉之王氏蓋稱世家逮于封君其聲彌嘉繼以憲伯度支並作如彼瓊枝分階而蕚忽如兩龍乘雲杳漠婉婉宜人云何弗樂其樂何以亦有諸孫歲時明綵羅拜如雲憲伯䝉恩自為廷尉象服是宜鸞章始貴國有封褒以勸為吏度支適來華階再賜玉佩丹裳萬里且至婉婉宜人謂將得意巳厭人寰韜恭斂懿惟是永思攀號為瘁婉婉宜人度支竟棄哀不忍聞為之永喟麻灣劉翁祭文麻灣在蒲臺縣東君生麻灣之鄉是古博昌之域博昌舊言多豪與力獨以恂恂人稱有德君始讀書能通大㫖巳復力田遂雄于委鬱鬱逺村亭亭雙梧雖等為農心匪區區貪夫徇利較于錙銖薄施厚責遑恤其餘且孰無兄君以父遇孰無宗人或若行路睦姓敦親君實有素貧不能喪婚者願取輒見哀憐是資是賻君當有意解囊匪顧客至如歸人聞知慕或豐于財招尤斂怨言君是為咸欽罔妬往髙令者風行電倐無豪不摧無微不燭見于邑中如君可録從此逢迎忘其為屬或庶肯來或造及屋鄉飲酒禮其容有肅再拜乞言如獲所欲吾歲壬辰曾上君堂是時秋杪君壽且康嘉賓四集羅饌芬芳時勸吾飲手自持觴華燈綺席𤣥冠縞裳别來幾何謂君已亡𤣥冬蓬首令子奔喪逝者何速吾感為傷林都御史奠文名琦代作吏急以奔市罷而哭惟公永還儀刑不復有木孔堅既購而得于以斫之為公之域錦茵既重繡裳咸式令子服成朝猶上食慘慘丹旌蕭蕭素幔夜如何其公寐無旦林都御史祭文名琦惟公先朝武皇之季持憲山東實主試事時舉于鄉則若一二余忝何知公嘗所器後登進士亦官在朝適公被讒家食逍遙時從門下或曛自朝崇論河懸危襟嶽出心極是傾日公為律約已服官以有今秩至江以西余忝載筆先是楚分星暉有溢史或占之曰方其吉未幾明時采公名實信十三州匪公孰率竟用重臣揚旌懸斧赫赫洪都公來開府自歲既殘逮氷甫泮倉卒訃聞人急為難嗚呼哀哉公今是來承敝既積有偉其施規模始畫嗟方之人雖未及藉解綬或奔豪猾斂跡余從末僚私嘗用懌謂當有行憂勞巳迫事亦何常晦朔僅歷慘慘蒼穹奪公是易憶往候公從容是夕曰吾必還惟子吾客惟公憐才舊延羣舄幾載凋零多從譴謫晚乃江干聊吾視厄酬酒兹晨悲今悼昔海內適聞公遙是役孰知素舟巳指窀穸道足輔相而位不赫夷落知名十年在僻偶出而亡能無痛惜林都御史祭文代作惟公令德名于寰中孝皇之季聲稱已雄正德改元官為御史時適凶閹盜我綱紀事多賄成人威是靡公獨卓然皎皎益美用出炎荒去國萬里時事後明公還召入復佐雄邊軍儲是給既陜以西甘棠有詩鄒魯文物公纍是持今皇神武欲威四夷乃擢如公四出視師公當寧夏桓桓于時既飭營壘亦揚旌麾虜衆氣奪望而畏之功乃不賞讒人有辭公既被讒十年于兹臺諫纍表公年不衰用是復起又南其轅官仍總憲地則名藩羣公亟勸璽書在門往歲亢旱人警是奔忍獨匿蔽不與上言嗷嗷列郡征稅獨存公至有聞感慨方切日及諸司議春所設無細不營無敝不決無乃既勞毁瘁逮絶嗚呼哀哉公昨始來人望咸恱有德有言儀刑罔缺况乃某等日從藩臬益習見公多所歷閲宏達為人務崇峻節胡為昊天既喪人傑後且何師疑莫我折有豆有觴有牲有血如公在筵精爽未滅嗚呼哀哉江西僉事王元玉母祭文元玉名琇去歲首夏吾在洪州猶及令子旦夕追遊繼聞促裝將覲于闕家本夷門有母白髮三年為别去從此出悠悠斾旌驅車巳發孰無母思念此歸哉南中十月鴻鴈始來嶺雲晝靄江風暮哀猶遲來儀慘焉巳縗煌煌令子昔名在臺璽書奬擢恩用是推奚用母儀丹輝玉錯有象其服既愈在閣令子領憲且名匪薄歸榮自南寧親為樂詎擬孺人兹還冥漠謂宜壽康衆咸是愕令子能文碩大日博一時聲稱咸謝弗若吾忝賓僚雖僅在昨十載交遊微名已托世人徇物不肖為賢匪情若是逐勢則遷彼佞邪子傾巧復然無細若大惟適目前當其得意獨喜自妍至禍人身成其毫杪古人憂心是用悄悄蹇拙况如吾衆所棄令子見知似緣同志豈以時豪而有余庇明信為人方嚴在位孺人有子雅量若是固宜友義報于孺人葬不及㑹弔不能親炙雞良薄聊遣是陳成都守王稚和母祭文稚和名廷梅黃岡人吾聞宜人蓋緣令子自歲癸末十年于此頃復令子俱為度支惟賢且達足我是師殘年領憲吾發自京有星耀耀亦南在荆良二千石成都作守紫綬金章云歸見母客有逺來詢吾親友似聞倚廬為日已久往者䝉被咸以大夫驅馳自逺擬上鸞符煌煌國恩婉婉慈娛是居幾何言笑已徂言念泣血旦夕嗚嗚倐又改歲無乃既虞方春生發咸茁已敷嗟獨棄背令子為孤令子友義今人則無始余罹咎與世絶殊侃侃令子獨取憐吾亦有同心二三子者晝日分曹夜多持斚豈無他人謂我則雅令子余視等于弟昆不能宜人執紼在原廬山北出江水東奔闕為登涉積思巳繁雲杳杳以無際靈忽忽而若存望黃岡其未逺致芳俎兮清尊廣西參議王公弼母祭文公弼名臣南昌人宜人之生既藴幽姿配于君子子復若斯有美令子昔在釋褐峩峩豸冠忽巳雋拔觀察東南宣威莫遏從此䝉恩二親並達三載用成是又賜紫維南桂林將撫于彼浩浩江流青山何崒伐鼓揚旌洪都是出眷言親閨復兹永日綵服華筵金尊寶瑟一夕哭聲宜人曰卒宜人有家用子既興藩參匪薄國恩載承宜盛以大後益聲稱將母之德纍世可徴某等癸未令子同舉拾年闊别偶陪笑語每欽行役歸及親寧忍見骨立巳毁其形悠悠泣奠慘慘日星鳥為徘徊行道為停悲歡何常弔者在庭薄陳再拜并告𤣥冥吉水毛都御史母祭文某等蓋聞夫人之康且祉而為中丞則慰乎此也中丞昨還獨甚自喜得奉慈閨莫吾足擬衆或聞言咸歎是淑世人趨榮遂忘止足幾及親年躬兹水菽臺長歸寧丹顔繡服雖輒攀號親嘗斂束中丞在南是稱洪族有赫其聲時望且屬凡人于人茍所願慕必祝其身并其長孺已則多履家用以興寰中日夜猶庶中丞復我功德濟此隕崩雖逺在彼咸愛靡憎蓋斂人情以為母德古有賢達虞子既逼咄此不祥將吾并賊無轂是丹無珍是飾慘慘憂心寧爾且食中丞持法殆古遺直茍力不能惟退為得奚用乘危母心用惻承召則行已辭再返矯矯鴻飛濛濛豹逺中丞孝養蓋備匪聊有婉慈顔既樂陶陶忽然鶴馭去何飄颻崇崇岡阜鬱鬱松楸倚廬索寞中丞在憂某等忝司方土極欽令猷以有中丞山甫之儔蔚為文宗浩乎邊籌特遣逺奠為邦是酬祭劉夫人嗚呼夫人而有斯疾遂斂光儀長夜是室懿兹洪族相國以興太守嗣服茂實方騰飛步中臺馳聲南紀為龍為光邈焉孰似亦惟夫人克修嚴祀亦既有行佐于君子伏惟夫人實秉幽姿自歸華屋往德是師無細不舉靡動匪規仰若慈姑下及羣育不厭圖書豈忘㫖蓄煜煜鸞章雍雍象服併受國恩亦丹其轂貴不期驕由來自昔女德尤難矧兹烜赫婉婉夫人秉心匪易既采蘋蘩亦麗絺綌亦有嫠姊矢死靡他卒成其志侔彼嵯峨閫儀既飭家道斯和溫恭慈惠雖古奚多世之悠悠恆多勿思過庭弗訓孰執其衰猗歟遐覽贊軌稱詩厥惟有子聲華日施伯也立朝亦驄其馬仲方隱約雲門之下擬陸機雲方蘇軾轍碩學宏辭深心峻節用是能宣乃祖之烈孰謂母儀有兹明哲數之不齊恆多難伍豈乏令儀或薄其祜何如夫人福德兼溥七十餘齡令終宰府嗷嗷伯仲昊天罔極抑抑哲孫憂心孔棘海岱惟青巨昧之陽靈輀將駕七月幾望零露泥泥逝波湯湯吁嗟莫贖亦孔之傷愚谷集卷九
