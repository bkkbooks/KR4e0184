body:
  text: 愚谷集巻三明李舜臣撰江西稿江西送陸叅赴陜西右使陸舊講官江頭頻送客此日復君行望裏青山合尊前采鷁明秦川遥問俗宣室舊知名聞有甘泉賦雄情待是成夢萬里臨淄路頃縁夢裏看村居還昨似樹色正冬殘道舊過親友憐余勉飯餐忽然疎竹雨催覺曙衾寒貢院桂花秋風凋衆葉桂樹晩應開幾日空深院清香伴碧苔拂衣人共覺移席雁初回念獨能為客看花是再來元日雪集和張憲使子魚客偶髙堂集春初上國還一尊仍對雪衆喜或豐年落處花枝重融時草色鮮最難君是唱終和未能妍十四夜藩省宴集薇垣看月上茲夕已嬋媛樓度庭初滿燈張市漸諠寒花滋露發火樹映星翻幾似今為樂笙歌倒一尊十五夜都司宴集月迥光無缺星寒爛已施百枝張幕色萬舞任渠為激壯軍中曲縱横坐上巵髙朋復佳節聊得此追隨十六夜滕王閣宴集憐此光猶滿迎曛閣已開江揺銀漢動山度紫煙來萬火紛南陌層樓逼上台憑欄無限好應約早春杯飲趙僉子玉别署緣陪衆君子飛葢偶能來暝色稀人吏髙堂命酒盃月明花露泫秋晩竹風迴無限相逢意羈愁為一開近郊宴集值雨出谷旌旗轉縁江鼔吹來異方多勝覽春色復相催野曠風生竹山青雨映梅惜無今夜月留酌踏煙回湖上望極東湖水春來益可憐長隄回草色斜日澹波煙窈窕鷗雙下逶迤渚自連何當呼小艇相與出潺湲卧起簿書時復暇聊得掩晴閨卧覺衾猶薄行來鳥正啼藥畦深石畔花徑遶亭西在逺心常愜春兼事事齊送陸副使罷歸吳江吳下能文者明時復陸機偶逢章水上已拂早春衣啼鳥晴相和歸雲晩競飛傾都人正惜君去掩山扉將按饒州正好秋蓬似因風轉未休世途輕宦拙兒女别家愁庭次梅初吐江南橘再收蒹葭何處夜今去泊孤舟風阻涉湖復指進賢始擬殘年棹如聞震澤平輕帆虛水色攬轡復山行出郭風扶轂穿林霧濯纓不辭遥役去霖潦此縱横進賢曉發道路北風發飄颻吹我行他鄉換雙鬢殘嵗轉孤旌夜雨草根活晨暉山色明經過從候吏雜樹識方名閲武晨煙萬突雜郊氛遥逐肩輿閲一軍雲薄寒城旌外湧江鳴逺樹坐中聞人多猿臂堪擒敵馬或龍媒乍不羣歸路徐看衰栁色似縁鉦鼓片時欣庭中植有紅梅偶過李叅兼有紅白二種因簡南州十月桂枝榮小院梅開近亦明色借紫雲凌霧薄香滋玉露入宵盈客懐聊得尊中遣詩句應能樹畔成天府兼如瑶蕚發從君臨賞倍含情憲使張子魚餽魚入門雙鯉濯蒼鱗知是君分與故人釣得云逢緘素遣將來應比錯刀新初晴雪色融斜日半吐花芳報早春安得煙波還此去正憐杯水歎吾頻早春貢院宴集弋陽王遣伎咸至江城鬱鬱朝常雨溪館泠泠霧始開地僻經冬封緑蘚春來隨處接金杯鶯聲管吹如相妒竹色波光倐盡回紛屢中庭方萬舞兼能分賞片時來亭上髙亭獨坐怯餘寒漸已晴暉轉畫䦨楊栁總歸湖外色梅花宛似雪中看疏池種竹隨春事散帙揮毫亦暫歡回首故人微禄在惟應拙薄自江干同諸公貢院小集最宜南陌靜緇塵况復髙城過雨新夾路啼鶯歌似響一春踏草到應頻侵苔薜荔縈初蔓隔水衣裳掛滿筠無限夕陽堪共醉明朝世務恐牽人雨南中一雨動成霖湖上春雲幾日隂似妬花開能爛漫全滋竹色使蕭森堦寒水濯繁苔出地僻煙封省樹深異域應常憐病骨茲晨聊得散幽襟東軒對雨長風吹雨過東園炎德驅無五月繁坐對遥山煙乍合正憐髙鳥濕能翻微官垂白空雙鬢久客躭幽稍一軒欄藥盆花看益好已多停水蕙蘭根貢院池上江城此地獨知名試共尋幽處處行選得松根千樹合移來水面各言清娟娟隔徑明丹實裊裊當波出翠莖未便觀魚好垂釣從渠窺客去來輕宴都司樟樹下幕府樟隂幾畆垂將軍綺席肯階移分明翠濕添盃酌竟夕清吟雜管吹烏鵲堪輕三伏雨青霄不礙萬年枝還須滿月情何似縱卜今宵露那知陪在滕王閣餞客共追使節到潺湲為復登樓在别筵近檻不勝游子意當杯祗覺衆人賢秋風磬折終誰是竟日笙歌亦自妍正憶陶潛初便去那曽束帶小兒前酬李伯華寄書忽驚平楚萬山秋稍喜行臺此地優白石青松逢處是危亭曲閣坐來幽一春種藥供多病方寸忘機減獨愁能枉遥書霄漢上相從同作豫章遊乙未中秋一從繫纜邁流光再見髙樓滿月凉總為嬋媛偏此夕不知留滯尚他鄉團團草露清難似細細蘿煙裊乍長行色欲依河漢曲待看瑶采度微茫送陳都御史致仕陳蘇州人贛州巡撫記曽顔色望青霄此地逢迎斧鉞飄下邑祗傳安石在南中空惜去旌揺雲連浦樹明秋野水浸江沙落早潮他日虎丘問耆舊清時龍德獨逍遥求賢詔許尚巖阿今復東還且奈何終屬陶潛三徑有真嫌劉寵一錢多江間緑水明心曲海上青山著鬢皤處處秋蘭猶自好扁舟采攬足經過幾人勲德在明時南紀公來偶視師誰使中軍生氣色獨籌前箸卧旌麾峴山有淚堪常墮章水無情任所之遼海只今憂未淺不當還出佐支離病懐吾生蹇拙合微名無奈侵尋病所嬰南國炎蒸今再過中秋醫藥尚無情苔殘白石庭隂合木落蒼堦露氣清門外江澄聞練似猶多虚負片帆輕瑞州寄别陸使遷廣東左使西來每憶城隅别左省初聞嶺外真倚望長天遥賜璽叨陪往日得驅輪春風祖席羣公出江閣樓船幾鷁新昏見漸南星獨迥暉暉應為紫垣人五老峯羣仙赤霞珮謁帝青霄通倐過崑崙顛八荒逝安窮廬山偶回首滄海蓬萊宫須臾酌彭蠡還駕來時鴻髙髙去無極遺跡茲巃嵸遂為萬仞石削壁凌蒼穹盤迴萬巖壑湖上峯獨雄朝雲變紫翠旦夕飛輕虹寒暑豈不化芝草四時紅昨出江州道天地覽斯崇仿彿見揖手招客令予東感此結深意夜寢煙山空忽若乗風下怡然數老翁把臂一共笑千年始相逢夢中憶所授病後扶衰躬復從碧澗側倚望瑶華叢極願捐微禄致身與之同吉安謁文山公祠公孫生員熈出公遺翰因示宋道昔云季戎馬摧中州獨公歴萬死感慨當時謀廬陵在南域冠葢元名陬嵳峩瑞華出浩蕩螺川流富田餘揖讓夙昔公園丘荒山闢祠舍生氣誰為收飛橋駕長虹松篁羅道周凉颷却炎暑好鳥鳴未休哲孫出遺翰忽若蒼龍游魯公稱妙絶惟此真其儔䕶持屬山靈棟宇終天留謁文山公祠道中作在逺日多思欽賢夜忘寐縁與簿書辭况復郊原遂野曠宜風生山深似雲戲臨流纓欲濯出谷衣全翠顧茲難久留拘迫慚為吏將按九江泊石頭口江閣逺猶雄江流澹若空晴沙行白鳥缺岸出青楓野泛清秋色山迴落日風真同漁父宿亦在釣磯東桃花山巖隨茅屋過荆扉水落溪田刈稻稀赤坂度山泥滑滑青松出谷霧霏霏寒帷北下聊吾事逐禄南中亦昨非稍喜雲開還在眼香爐石耳自晴暉德安道中蔓草垂藤引使車石田流水帶人居清秋不落丹巖樹薄午方縁白石渠谷口魚梁旌斾轉山中蘿徑牧樵餘為應問俗遲遲去纔可塵煩漸漸疎圓通寺百里廬山勝獨尋山山林壑帶秋隂微風夾路參差見竟日娛人紫翠森稍訝飛軒行樹杪忽看削壁入雲深幽居謝爾為僧在清磬時時物外心吾未識李空同先生每讀先生詩且官渠後欽其為人過圓通寺懸多詩刻而僧獨取先生者有靜言看石耳之句石耳峯名廬山佳處先生是在武皇年彩筆滄江動逺天僧徒亦識山中字學士今傳鄴下篇當日鳴泉邀節鉞清秋髙閣自雲煙誰令流落明時去石耳空知炫獨妍宿東林寺谷轉還青嶠煙扶下赤坡秋山凋葉少暝徑咽泉多舊迹餘溪沼深齋到薜蘿更邀明月上徙倚辨嵯峩山寺忽雲端山行處處歡晩凉巖際宿秋色月中看緩步多幽壑清聲即近灘蒼堦疑露濕瀑水墮空寒發東林東林千載後尚種芙蓉池出門見初日夾路雲煙隨深谷忽無極灑嶠泉奔馳潺潺碧澗吞裊裊垂猿枝微風動幽響萬壑清秋時長林鬱光景竹樹何參差蒼茫虎溪路故蹊不可窺前山復迴合度嶺揚旌麾恍若乗風翔果與丹霄期雜花半巖上草露團葳㽔雄蟠三百里竒峯方在茲崢嶸乍可望浩蕩今晨思登遊能累宿肯負幽人姿九月八日始聞雁聲東山常八月夜夜雁歸聲何至江州聽方多菊露清倚簷長送爾逺道總闗情不問都門過知無繫帛輕九江分司對雨偶出廬山下輕雲隨葢飛度河為暝色灑雨滿秋扉細細從東至森森洗竹暉捲簾入蒼霧還寢更絺衣漸夕堦生溜羣峯勢乍稀江流何震蕩鴻雁亦來歸是月黄花節清宵玉露揮髙城恐寂寞滋菊使芳菲九日佳晨爛漫隔籬枝水國煙霜落木時百里廬山堪勝絶三秋鴻雁獨歸遲肩輿尚爾行花縣戲馬應渠載酒巵止飲經年還肺病蕭條一任北風吹九江分司九日劉副使見過遥水樓船擁節旄明公斧鉞靜江臯為逢雁度俱今日肯假霜威過濁醪手裏黄花清露滿城隅白浪暮天髙出門歴歴明星在指㸃秋河到玉鑣九江李主事招至洗心亭上時同劉副使在坐江流霧斂自晴川江閣秋深况綺筵幔巻微風添坐色堦含濺水倍花鮮當歌浪鼓蛟鼉夕隔岸山揺竹樹煙李白劉楨應逸興時時能此共潺湲將發九江啼雞催曉發度雁倐秋深自是羈懐甚兼多草際吟風清山易冷月落閣還隂木葉兼江浪方添隠几心登天池東林徑轉過村翁為指天池此路通側蹬迴峯傾午日危亭俯澗落秋風直縁薜荔千巖上稍出旌旗萬木中倐忽白雲山谷滿只疑蓬島坐溟空宿開先寺山行累日度車遲正爾躭山處處竒近寺看峯還劍似窮幽積水到龍池泉飛直下三千丈月出裁虧二八時隠隠牛間應紫氣書臺髙卧露天滋開先寺别何邦鎮昔人讀書處瀑水香爐峯年往碑仍在雲深嶂若重長風吹落日林壑上秋容何意都門舊今遥此地逢佛手巖巖近顛仙碑亭山中雲共宿秋晩菊爭開突兀懸巖出蒼茫拂霧來碑亭看再過峯勢抱千迴誰結茅簷下能堪碧澗哀讀書臺在雙劍峯下南唐李煜讀書處也後主嘗是遊幽巖既為寺書臺俯石門綵閣兼山賜雙劍削天端千秋猶覇意蒼茫谷口來徙倚江南思觀瀾閣天地見彭蠡清淺雜煙浮忽訝城隅望蒼茫海上秋長風驅逺水落日走神虯駭浪時能似銀山碎十洲愚谷集巻三
