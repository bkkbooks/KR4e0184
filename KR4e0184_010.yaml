body:
  text: 愚谷集卷十明李舜臣撰雜著豐城王生沾宗化字說豐城王生沾者而乃其鄉先生者為之字也曰宗化者於是王生質余何以字宗化乎余按說文沾即今人讀添字也借知廉切則生今名漬也化者變之成也易曰乾道變化四時之序是已聖人治世能變人之不善而還之善變其習之不美而還之美於是不善之人變而莫不善不美之習變而莫不美者亦曰化也然自秦漢以來言治理者多沾化云上下同德則辟之水有鍾于地而旁無弗滋也有著于物而燥無弗濕也水則漬矣觀其寸而尺寡而多者豈不自有漸哉化之指莫備于書舜命䕫典樂教胄子曰剛而無虐簡而無敖言人剛者美矣剛而虐又不美簡者美矣簡而敖又不美銷其粗悍之氣則剛無不可為釋其拂戾之心則簡無不可有故化之義二或始無焉而益之有則甚美者不可無也或始有焉而反之無則不美者不可有也夫宗之言尊也非誠有貴于化又無所取于化而得王生來太學居歷申酉戌三年矣太學諸生千人矣論能讀書勉行千人之中往往稱生姓名當進諸生考問所業見生于業時時有所長益生朂之哉是殆宗化也巳尚書師說有序吾師故濟南太守蕭先生也先生諱孟景字時泰順天三河人也寓家于京而余以正德乙亥從先生于崇文門外草場巷余讀尚書䝉于先生者矣憶為余稱書者書曰宗彞藻火粉米黼黻先生曰蔡宗彞虎蜼據疏虎彞與蜼彞爾若是為一章而二具二之則兼藻火粉米黼黻為七夫宗彞者宗廟之常尊也至周而文何遂言是虎耶蜼耶弼成五服至于五千先生曰五千者五服每面一千二百二十五里矣故王制流沙至海衡至恆皆三千里然而三千里者周尺小也厥貢璆鐵銀鏤砮磬厥貢惟璆琳琅玕先生曰璆琳西域産也雍鄰西域梁介西南夷蓋雖先王不能不務其所不能不用不能不令如漢以來互易外矣何也圭也璧也惟斆學半先生曰半者一生二也雖然有離而二有儀而二斆學半者儀而二也何也辟之錢璧于圓尺寸于十夫錢璧中好而分則不成為錢璧尺寸中五而分則不成為尺寸今欲人善而自不為善者不矣惟天隂隲下民相協厥居我不知其彞倫攸敘先生曰王之問也謂王執以為不知彞倫問歟則謂王知彞倫巳而止欲為之甲乙之歟乃王誠執以為不知彞倫而問若是敘訓次者次猶在也君子所其無逸先知稼穡之艱難乃逸則知小人之依先生曰所所君子也乃逸者其始欲為逸也題三世循良卷後吾友王誠甫既舉進士領大名令再調長垣皆舉其職有異政焉是時同年四百人而外補者殆三之二然以循良最著稱者皆莫如誠甫竟以是陟選部主事未幾人有欲得之者則調司封又為有力者所奪則調户部既調户部若置之矣積又五年而遷雲南部郎中癸已之夏吾亦以調湖廣部得與誠甫日相從焉一日出其在長垣時及乃祖郎中公謫和州時乃尊友山先生在澤州時皆既去之後人思慕之不能忘也鄉之士大夫為之紀實而勒之石者凡三刻臨邑李貢卿次而録之題其首曰三世循良吾得而讀之曰今乃知誠甫長垣之政有由然矣聞見之習一也文學之資二也誠甫天資卓絶古人書無不讀者發而為文汪洋浩肆而不可測而世人未知之也世有顯秩以俟學古之人有華選以豫修辭之士而誠甫不與也雖登顯秩列華選者不少矣然視誠甫未必如也或相去逺甚而顧誠甫獨不見知不見薦也在選部則奪在司封則奪在户部則若置也吾見古今人惟文學者之難遇也常求其故易稱同聲相應同氣相求何也有是則勿爭能是則勿嫌也能不爭能不嫌也而後能薦其次者雖能薦也未必能知則詭遇之夫覬得真實之才或遺然在君子猶以雖詘于此庶幾伸于彼也雖失于今庶幾得于後也其又次者不必知也不必薦也而徒能有假之之術于是取未嘗操管者假之以名曰文取其未嘗披簡者假之以名曰學夫其于未嘗披簡與操管者豈不以能適已能助已哉適已者讒佞者也助已者姦利者也讒佞姦利之於敦諒而明俊者逺矣皆不得已强而名之曰文曰學然在君子猶以不見録也幸不見傷也無所榮也幸無所纍也乃以其次者大不然矣不見知已矣不見薦已矣讒佞者姦利者赧焉又忌之也必將去其所忌而後欣欣然快且康也不免誣人之行而罰其躬方是時稱文學者且及于難况能顯秩之登華選之列乎古今人所以多不遇也嗟乎此但可為誠甫道也未村居士自述余家鵲村周田平美莫為山溪南望臨淄裁半辰往可履其域今泰山北樂土益都臨淄而鵲村田脈浸浸然向臨淄或曰鵲村倍乘他村倍未必然如人伯仲謂村他村伯者可也嘗投鵲村自南門出百步行巳西南指過安氏耿氏袁氏三村袁氏村先曾祖墓在焉復從先墓西南指二三里外木蔚然合縈帶鵲村也西閭左內余聚族在負隂面陽前臨大道還倚西南望城在城未方余所以為未也未一借義無也詩不云乎未見君子何以異于余萬卷藏書而未讀者余所以為未也又未古味字也則木果成曲直酸者夏六月也在昔神農氏嘗本草酸屬多寒亦窮其致木老于未歷申酉戌霜降北風鳴木兼葉剝槁矣果實則存所謂性情者也余自春田躬督課藝勤雨占風仰希升斗之益于蒼蒼上荷卒入麥百斛粟二百斛問內晝三飯邪頓食咸足亦春鑿井園蔬備具擇所食麥脫粟室依依然無苦惡色余所以為未也壬寅秋八月記西橋先生壽光劉公事狀續遺余讀章丘李公所為壽光劉公志銘曰昌邑翟公狀也顧有少遺事在歲丁亥庚寅間是時翟公在外而李公以已丑春舉進士未及聞乎事一關余略曰遂寧席公之為大宗伯也永嘉張公安仁桂公為學士陳珖者得因三公復以僉事補內左給事中憾于吏部論少宰弋陽汪公去位南城夏于中歷城劉希尹亳薛君采吏部郎也于中希尹補外君采罷歸當是時即墨藍玉甫為御史獨憤然曰席尚書何得曲庇陳珖使禍正乎遂論席公及陳珖事疏下刑部議陳珖事當按當是時壽光趙康敏公為大司冦一旦罷朝張公桂公向趙公曰陳事可勿按御史誣耳趙公曰論法珖事當按張公桂公語稍不巽趙公怒曰吾備位大臣豈為爾輩持耶竟按陳諸事罪裁免死張公得政為陳珖報欲奪趙公故官徴藍玉甫下錦衣獄當是時公典誥敕房位在內閣獨向張公解曰趙司冦藍御史何罪趙司冦之歸也䝉恩御製賜詩因西北面為張公莊誦御製賜司冦詩曰果若是何以奉御製詩張公悟曰非君吾不知趙嘗䝉御製詩公曰藍御史不過論陳珖顧珖何如人哉而公終為之何今人莫不賢藍御史公何不為賢者而珖為何公今即何如法藍御史公能使人不曰藍御史人賢者乎張公止擬巡按御史提問藍玉甫為民而巳歲已丑言官論罷張公有及文選主事王子揚王子揚者張公之姊子也當是時南海方公為太宰而余備員考功員外郎郴鄧以正為郎中以正病目方公屬余為稿擬王主事降外章未及上張公復位王以告張公張公一旦向公姓名余曰是務禍王某公問其故公曰是奉明㫖擬奏者耳事賴而寢部擬若上當為言官張公無以應但姓名余曰何當黨楊公蓋指鎮江楊少師公公曰不然李與吾同郡人也吾嘗為楊公姓名其人而楊公曰未見也李果未嘗造楊公門且李去歲冬如京今一歲間且問一歲之間李曾幾造公之門乎張公曰未公曰若是李且未嘗造楊公門余後乞疾張公欲援有疾例擬余致仕公解之曰李知公之不與也今引疾求去人茍自知肯解而去巳矣驟擬致仕駭逺近聞李誠不敢以其不可之身茍而爾公耳目且李少年假令後有人用之者假令有人又謂用之者曰是其謂今擬致仕者何公自武皇朝專典誥敕自張公始請移誥敕以命諸學士朝廷後復以命公癸已以來國多大慶推恩內外官崇卑奚啻千而人父母內數千篇辭每公代草皆不過三四月軸辦出謁拜公者公之堂坐嘗滿張公時張公褊心而橫氣雄視而叱咤聲遇怒發赭面視罷人官置人于法易耳閣中滿俊獨公正色其間嘗以纂修事與張公辨墓志所謂抗辭正色不少隨巽此也公至有曰今不過公所親為公客者才賢列位六七人耳自餘人多怨公頗聞李文正公先達則心願公與公為友李公相日公官裁尚寶丞忽乘戌夜叩李公門李公已就寢起衣冠出命酒賦詩夜分罷去盛事哉惠迪吉從逆凶惟影響按吉凶禍福義不同訓禍福皆從示神所與者令富貴壽康所弗與者令疾困摧敗富貴壽康福也而不可專言吉疾困摧敗禍也而不可專言凶說文吉善也凶象地穿交陷其中塹可陷人如人不孝之棄其親不忠亂人國也傳曰兵凶器也今人殺人梃若刃皆稱凶器夫凶惡一也行不義者言不可觀又謂之惡誠有不孝而棄親不忠而亂國者豈有足觀聽哉故祭禮備儀以是為吉喪務去飾以是為凶道有縗絰哭者人必不忍視矣夫影隨形者立則立坐則坐也響隨聲者髙則髙下則下也今但謂形隨影矣而不及形立坐乃人端笏與疾走者影可同乎響隨聲矣而不及聲髙下乃人撞鐘與吹竹者響可同乎易曰吉凶者失得之象也人得于理為善善即吉也不得于理為惡惡即凶也惠迪吉從逆凶所為若是則所成者若是而人所見我者與名我者必若是疑是為影響歟若謂吉即富貴壽康凶即疾困摧敗今善人何限而不必皆富貴壽康不善人何限而不必皆疾困摧敗豈有若影隨形響隨聲哉詩書稱吉人凶人多矣直如今善惡人云要之為善有不富貴壽康稱善人矣或吉人矣為惡有不疾困摧敗稱惡人矣或凶人矣而不有名福人禍人本人不可必致者也吉凶所應可如影響知即善惡之義明矣乃若易貞凶者恆初六注所謂有害于正者哉是故君子戒慎乎其所不睹恐懼乎其所不聞集注君子之心常存敬畏雖不見聞亦不敢忽釋此極明而人偶未察也至離動靜之心平如寒暑晝夜逺矣易曰寂然不動感而遂通天下之故人心輒感而罕寂云若可平如寒暑晝夜今人孰無此心言當何時感通何時寂哉此言君子能不離道于須臾也人以目睹以耳聽聞至其所以能睹能聽聞者心也是故意念方萌目有所睹耳亦有聞志慮方寂目無所睹耳亦無聞子思若曰人心亦有不睹不聞之時法家之言曰計日者以百刻言刻巳微須臾在刻豈不僅若絲毫等兩重哉子思若曰雖有不睹不聞之時直須臾耳感而遂通巳睹巳聞夫當睹而戒慎聞而恐懼孰非天理心哉乃雖不睹不聞而其戒慎恐懼不可歇也子思若曰能不須臾而忘戒慎恐懼然後可毋須臾離道其言戒慎恐懼皆人巳發之心發而後有戒慎恐懼未發則何戒慎恐懼之有謝賜御著大狩龍飛録奏南京尚寶司卿臣李舜臣謹奏謝頒著御著大狩龍飛録者伏以輝光奪目若當雲漢為章精義入神始擬河圖再出敢希臣幸以至此多恭惟皇上聰明配天中正御極五載巡狩在虞舜巳然一代典章賴吾君有作况顯陵之一别方聖母之遐升吉協于天地鬼神而詢同于臣工內外方春布詔與時偕行因萬國之咸心營二聖之嚴寢皇情深至道路而不廢思御蹕遙稱山河而頓生色蓋始告廟以至回鑾宜多睿篇而有成帙聲皆為律德本重華藹若春溫則遣諸王就國寬其歲入何幸一路編民加往哲而見褒信容光之必照豈徒嫓古良未如今大孝寧親至文在物者也臣官叨朝列職守南司懼莫補于秋毫賴有諄乎天語不食不寢願終日夜以思乃聖乃神詎測淵源所自臣無任感激之至與崔后渠書舜臣啓爾雅當為釋經而作竊意爾雅滯于章句說文滯于邊旁有所長者有所短與漢儒務存爾雅又于爾雅有滯者焉宋仍漢訓有不必仍又薄爾雅說文不信而信近傳廣韻增韻第三第四義焉字學不明於義安取大篆巳降况秦𨽻乎今用秦𨽻訓古聖人文豈不逺哉且孰非說經而漢儒執禮過嚴于義反陋宋儒說理過詳于言反淺尊裁幸甚西平稼餘自述余村直廬歷阪而西地髙平者殆三十畝于是築園其上惟余頗讀易詩書春秋以去歲甲辰春余生四十有六以來庶又十有二年而為余年五十有七若是易詩書春秋益三稿畢而始及于大學中庸論語孟子然大學中庸論語孟子本自兒時所讀意輒有㑹坐之中也馬之上也飯之既也覺之餘也然余感于韓文公云聰明不及于前時者嗟乎余不如往有情多矣雖得遲以十有一年而為余年五十有七必當是時且今如乎若并故與今所得于大學中庸論語孟子貯余內者忽然復失豈不惜哉余多城居易詩書春秋三禮隨余留城舍而閣大學中庸論語孟子孝經于村所謂西平園者以課稼之閒即而讀之存其所得蓋余非讀書何為愚谷集卷十
