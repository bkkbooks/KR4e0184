  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0184_WYG_004-1a, image: WYG1273/WYG1273-0678a.png}
body:
  text: 愚谷集卷四明李舜臣撰歸田稿秋日郊行步出無晨暮薄田隨所經雖非達者致元是野人形晴雨滋寒水涼飈起夕坰何知謝金紫歸意反吾寧飲酒終朝靜無事頗賴酒尊濃醉裏愁能薄歸來興不空深杯從婦勸頻顧覺兒聰怪底陶彭澤田多種秫功貧家何所有濁酒在牀頭手輒禁寒漉身應為晚謀村中單騎入燈下數行休賴得醺然卧區區誰復求秋夕友人過飲墀菊開應晚園蔬摘欲霜一樽來共酌數本坐猶芳柴館始晴雨荒筵及月涼愧非賢者室帶有德星光秋日諸友招飲病體未赴一自得歸心追遊每共尋銜杯能月上開菊况秋深露白庭隂淨山青海氣沉應多新熟酒擬作向來斟始擬戶常關歸身反未間一秋農自去竟日鳥俱還落樹出平野澄潭入晚山登髙雖此月知濯畝中顔不復身豪健千杯似往年春來能斷酒嵗晚未歸田客為黃花命歌應白雪妍相從欲何限今負主人賢余家南望是十里到城餘地僻惟聞雁村貧亦有蔬舊開三徑在新結數楹居早晚攀同駕來看隱者廬自漢推經術吾鄉未乏儒俱操金石奏誰止玉堂趨帶水滋星氣髙城表海隅病夫何所望公等日亨衢壬寅九月十有七日吾生四十有四年矣叨官敢自意亦昨賦歸歟家薄徒書滿園荒始草除眼看鴻雁去心覺蕙蘭疏益忝衰容鬢年垂五九餘冬日招友人飲二首讀書非避世種竹稍成家幾為辭城市因之卧海涯小堂春覆草曲檻晚留花及此髙軒過郊原欲雪加村醪秋自釀園果嵗能收不有親交共誰堪寥廓愁花中惟愛菊淄上不驚鷗旦日城南路無嫌我薄留甲辰初度年年今日酒多為菊花斟歌管誰能那芳菲乍可臨罷場園賦入閉户草蟲吟敢向誇朋輩悠然嵗暮心初度友人過飲乍喜髙軒過還驚短髮催相看俱老大相慰有歸來濁酒家能釀黃花手所栽今宵踏明月莫惜醉中回于時仲春作仲春詩維時春欲半映日色皆分草意侵階出新聲到處聞林開花照樹氷泮水生紋更有銜泥燕飛來意似欣首夏園中獨坐東園裏仍耽首夏時乍將書自曝微悅鳥還窺爛漫仙人實芳菲大谷枝願希髙尚者從此學棲遲園中起卧祗茅屋行吟自野夫山林非遁世水竹乃忘吾鶯語春將晚葵傾日向晡憐茲雖負郭似覺逺人徒庭中昨夜雨新晴今朝花更明下階看鹿迹倚樹辨禽聲袖為移蘭濕襟緣愛竹清荒居春較可况復托歸情飲李氏村同程伯書使君乘月踏雪聯輿而還路出金波外車驅素雪間清光兩相映乘興偶俱還野入銀為塢星涵玉作山褰帷三十里獨喜淨塵顔過友人郊園暇日薄言出郊園到薜蘿為將芳樹歇亦是别君多即檻看紅藥開尊面緑荷晚來煙徑上率爾遂長歌别館成招友人飲一自春風二月初柴扉竹徑作間居城中好似山人宅門外應多長者車阻雨新店有懷仁夫宿雨淹歸騎終朝在逺岑閣中山木落門外海雲深無復為吾適况當懷所欽應憐洋水上何處托孤吟小堂寒江獨釣圖未徹宜此春雪小堂不及掃尚挂寒江圖怪底春來雪飄然二月俱酬何廣文惠鵝科頭晨未梳報有山隂使不及書黃庭叨承余自愧雨夜雨氣侵簾入風聲托樹長片雲能掩月星宿此俱藏雜著至家萬里羈危日孤兒慟絶時艱難歸敝屋寂寞向空帷耿耿中宵立漣漣盡日悲不能成一寐托夢接光儀謁先墓歸途作潛寐忽已久神遊竟不還目存猶髣佛血繼更潺湲雨後花饒笑春深鳥自間嗟吾亦多罪天也獨投艱丙戌初度九月十七日屆吾初度緬憶辛巳年吾有東南之行是日也蓋在揚州明年壬午從先子奔喪歸是日在宿遷縣又明年癸未吾舉進士得奉朝趨三年皆在京不知今日乃在廬次薦祫時方燠羣芳忽已闋嗷嗷南翔雁猶解違霜雪人生誠未易無徴傷吾劣淮海魂昔驚京華心每折尤憐今日淚沾灑盡成血陳思悼幼女辭吾五福無徴秋懷時吾生已二十九年耿耿憂難歇秋風彌自憐雲深疲去雁露冷咽鳴蟬薄命貧仍病疏心悔更愆無聞聖所戒而我已茲年戊子中秋見月痛憶往昔摧肝剖髓情見乎辭明月皎三五况復中秋時清暉豈不滿望望祗益悲憶昔忝朝趨親承白髮娛休浣時乘暇歡宴日相煦歸散紫宸朝鳴玉步逍遙譬烏本戀私何言寄迢迢佳節一以臨欣承旅寓心稱觴拜且舞起坐彈鳴琴及釡方在此樽罍復能綺圓方且珍羞水陸充遐邇嗟吾薄祜躬五福本無同惠時良不偶孔燕誰能終異物感弱孫沉痛為銷魂大運一陵替萬事茲掌翻嗟吾天所伐吾罪甘隕越白髮遂見奪含貝一何忽孤兒號欲絶五內崩以裂從此飾歸輤血繼聲幽咽間關指敝屋二九達東服生行見櫬還慘惻動邦族孤兒苦欲死嘔血將難已恭承哲人意黽勉茲伊始墓門何蕭蕭剖髓訣今朝歸體托窮泉慟絶不可招自昔入承明庶幾振金聲方舄終越吟擬翰祗蓴情投簮三上書微尚不自如巖巖東曹間維縶心何疏頗聞古人志微祿欣從事寧知為所嬰嵗暮及顛躓顛躓茲云極白日忽西匿獨覽泣吾非酷痛摧中臆倚廬日月遷寥廓奉几筵薦禫時方燠忽忽吟寒蟬躑躅下中堂椎心訴穹蒼白露沾我衣驚風飄我裳衰草咽秋蟲清野號孤鴻俯仰竊自憐積恨安所終除夕悲今情已摧懷往中彌逆憂來信無方悽然忽不懌擬粲七哀兼方衡四愁劇攢念猶在茲何以言除夕元旦作大運握冥機蒼精散初澤三統開元祚羣化舒柔脈皇聖昭神功下國同光飾猶自空堂上抱影悲今昔束帶愆既多反服瑕彌積行年忽在茲瓠落空吾迹棲之鷦鷯枝奮非霄漢翮茫茫途已窮永歎將安適禫後禫服憐殘息間園學種蔬飢餐惟赤米緩步有清渠谷口稀人訪蘿軒淡自居方知棲遁者不惜謝公車將發鄉園效唐初體鷺行趨命日蟬翼聳身時樹落千山色風生萬壑悲含情辭故里揮涕戀先祠莫使東園穢歸歟已有期佳氣指神京邦人餞有行詔從天漢落淚逐露秋傾去去傷蓬轉呦呦感鹿鳴甘泉曽擬賦獻罷即歸耕海豐道中海氣鬱蒼蒼山河失故疆重來村落改遙望荻蘆黃行李隨秋色衣冠赴帝鄉謬同趨召者慙負意何長晚投鹽山縣行路一何難迎曛尚據鞍林應千鳥宿天已萬星寒月出明前渚風聲雜近灘荒城知未逺隱隱氣中看馬坡村贈舊館人數載今重到還非駟馬來主人年鬢改遊子客程催雞黍歡清夜階除落故槐明秋隨朔雁遲我復能回宿霸州館寥廓此中宿遙聽易水聲鑒帷畿月入疏館北風鳴夜覺秋初永寒知霜正清不堪情已倦明日尚遄征愚谷集卷四
