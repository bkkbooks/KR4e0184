body:
  text: 愚谷集巻二明李舜臣撰金陵稿金陵遇馮子和舊同吏部山城初上日鞍馬落前墀宛似清朝罷叨陪宰府時浮雲如世事流水只君思五嶽惟當去看余鬢欲絲宴集東麓亭因過西山道院幽房去何處只隔杏花叢碧水如明鏡青山掛彩虹庭滋芳草遍城枕大江雄雖復隣朝市東南在目中送湛甘泉尚書赴京海内稱耆舊公名滿縉紳遭時佐明主幾嵗托邦人鎮俗山河壯移官省閣新平生經濟在詣闕待親陳送潘鵝峯侍郎改官兵部清朝司馬貴選授必人英已佐金陵久還徴采鷁行殊方知姓字前席待光榮公到多籌畫邊塵豈復驚不寐冬來不適意况復雁南飛枕上空山葉窓中明月暉一秋多在病千里正思歸不耐江南住今年又授衣送劉叔正出守永平南國接芬芳忻聞薦省郎君行名已晩此别路何長馬首指滄海漁陽即故疆異時儒術理為郡有輝光庭樹為愛窓前樹花時一院馡清霜能肅殺黄葉早紛飛近壁蛛絲滿空庭鳥宿稀悽然此時意不獨弔殘暉同劉叔正王道思李邦良登報恩寺浮圖隠隠荆門水紛紛海上山身猶依禁闕目已極河闗簷日千巖散窓雲五色還同來霄漢裏獨喜淨塵顔送同年張助教赴刑部主事同榜十年餘君才世所須遭逢多不賤辛苦獨為儒畫舫乗春去金門待漏趨分曹荷明主從此借雲衢送王念覺出守衞輝王舊給事曩君報主志慷慨即南車到處為良吏明廷有諫書潮平江路濶沙淨日光虛早逐春風去中州領郡初贈徐章甫大理明時廷尉選佳勝復留都湖水清官舍山城入畫圖平反三嵗在幽賞四時俱不見歌為政人今滿路衢李端甫招至徐氏東園鄉人同坐端甫時有杭州之行繁華南國裏流水古城邊剖竹人將去投林鳥競翩潭光澄日夕栁色變春先笑指清尊在要當醉别筵徐錦衣西園陪宴朱子禮太僕尚憶觀魚戲重來送馬蹄故人江漢客賢主薜蘿棲煖日榮芳樹晴煙小碧溪春風二三月定有好禽啼送内兄伯雨出守松江海上分符日城隅立馬時昨來何自意早到使人悲雨雪征途滿春風到郡吹惟應大江去浩蕩寄相思餞别内兄伯雨明經有未遇四十已專城豈不榮名羨終多悵别情山橋氷欲合官舍雨常鳴賴有前庭竹能如舅氏清内兄見招夜坐言别到門忽自識客舍早梅開凜嵗偶相似清芬又不摧江風飄月上河漢倒煙來長孺亦為郡當時許召回内兄見招軍器局鄉人同坐爾郡得斯人終知戀所親椎牛徴我輩過鳥怪簮紳華館凉隂結丹樓霽雪新勿言獨别去誰料客中身内兄見招東園諸公同坐一徑入幽園門墻繞樹繁大夫為地主公子避人諠水竹無塵到寒花有雪存輝輝長者後吾忝亦飛軒徐錦衣西園陪餞内兄素雪舒梅遍蒼煙帶竹深林扉開淨色庭木落疎隂五馬故人去三杯遊子吟池亭多可到歸路恐難尋鑿石新成徑臨流舊結軒城邊飛葢駐樹杪鳳臺存融雪滋花色微風送鳥言夕陽未歸去垂釣待魚飱葉生宅陪餞内兄誰不惜車東聲華滿國中巻簾堂未暮吹竹盞能空池水澄寒碧窓花馥晩紅親交知我在為爾餞筵同過别内兄落日鳳城頭微風鼔角流御溝寒水咽清禁紫煙浮剖竹為名郡横金作逺遊平生輕外慮不免别君愁内兄過别雞鳴山房積雪侵苔徑殘山抱竹扉蕭條官舍暮惆悵帝京違海路愁俱往江城淚共揮雞鳴北湖上憑望去光輝神樂觀諸公同坐餞别内兄環山雄帝郭逝水鑿秦年嵗嵗甘泉上煌煌大道邊歌鍾流白日征斾巻寒煙何似為邦去傾城餞我賢郊别内兄青山看欲斷紫陌去何長日氣揺寒水風聲送晩凉金陵龍虎勢寶劍斗牛光獨有臨分袂僕夫亦感傷贈别内兄伯雨吾今年夏幸托雲巖先生門下秋來陪侍二三月耳而先生為松江之行何遽别也詩十一首多縁杯酒之間誠不能為别亦紀相從竊意先生不能别我亦如是也嘉山水者不必廬處嗜珍㫖者不必頓食人有未言而思千里相好心則然耳去方凜嵗桂樹冬榮梅竹交輝江山滿目太白不云寸心貴不忘乎朔風一何勁飄然江上吹江南一夜梅花發積雪朝看亦滿墀雪色梅花兩相映都門無處無芳徑一尊攜酒逺來此望裏青山道傍水與君同生渤海域君家淄南我淄北少年弄筆競為文一日稱名俱可識遭時吾忝尚書郎已復君稱宰邑良功能不獨明廷最公等今扶漢道昌赫赫留朝六補闕從此官論青鎖月四海流傳賈誼書千秋如未歐陽没而我迂愚世所嗔紛紛情態後來新不能東耕避賢者空復南冠學事人蓬鬢沙顔誰復憐遙山瘴水昨來旋東城並馬是何日南國啼鶯二月天楊栁青青大江涘江流浩浩思歸子君行過闕覲衣裳吾繼還鄉問桑梓雲裏長松碧石枝朝來滿樹緑蘿絲絲蘿詎擬今如是天馬由來衆不知猶及觀濤八月回况復登髙九日杯黄花入手便芳馥清江照人無塵埃儒宫舊在雞鳴麓諌垣能枉鹿頭轂無數名山許共行不時緑酒歡方逐謂來相逢得相守岐路驚人又分手客中孤遊空我情海上殊觀盡君有賔還宴罷東將去此際看君空百慮過鳥交啼把袂前歸雲故繞翻旌處男兒所至要名成不須别淚紛紛傾煌煌為良二千石台鼎他年在此行送蘇一峯侍郎獻績如京蘇舊銓司日色覆平津年光催别晨江帆今送客水鏡舊為人城闕融殘雪山河入早春寄言花共栁好作道途新送曹給事赴京諫議官應重看君此一時書因規社上名始賦臺知過闕春將晩揚帆雨乍隨江流亦東去懐主共如斯送孫京兆致仕歸慈谿城郭頓生姿金陵坐鎮時致身時輩許乞疾主恩推人老攀江上山林卧海涯祗應五色詔名德復婁師送倫彦式祭酒奉其太夫人歸養南海君著老萊衣非歡晝錦歸師筵新禮樂帝幄舊恩暉路入黄花滿檣隨彩霧飛三年髙義在復爾戀依依送張子陽太常赴京今皇經術理侍從復君才宇内名誰敵南中召獨回江雲隨五色夜宿接三台應憶金陵别秋風鴻雁來送費鐘石侍郎上績如京遥將三嵗績北闕上龍墀宰府古來貴斯文今在茲衣冠匡世俗勲德滿京師正值梅花發清芬薦别巵送曹給事出守寧國嵗月金門路叨陪上履綦君多補衮意吾送剖符時南國股肱郡西川玉雪姿敬亭今勝絶應待有新詩送曽給事赴京金陵望京色只在五雲邊側席君王待南司諷議賢才兼堪世用書奏使人傳酒罷欲分手羨君行若仙送聞石塘太宰赴京山水浙東去聲華共若斯髙賢希世出明主俾衡持風俗歸淳後春廷上績時人今公盡望留佐衮衣垂送錢桐溪司徒赴京不獨稱佳麗河山王氣存司徒分國計端笏儼都門宇内勲名滿江南制節繁誰能公可薦密勿切朝昏楊給事尊堂受封載筆聞曩至晨昏願豈違遭逢勸簮笏浩蕩借恩暉瑣闥人賢在金陵母德歸共言能主報直道似君稀送歐石江少宰為赴司衡召應聞開府賢歌聲方陜日啟事藉山年才大今能用書成世已傳從茲雲路濶豪俊入翩翩送陳介泉中丞赴河西張掖國西門中丞山甫論從天下節鉞絶塞駐戎軒蠻賦千邦入威名萬里存空傳漢出使此路去河源送李涔涯尚書赴京敕使召還都爭言新命殊三朝皆報主六典復司徒舊德今誰在皇心古帝俱最應邊餉賴西北壯規模送徐楓岡中丞赴薊中丞今塞上開府作藩維况復神州在應勞聖主知山河千古壯氣象八陵滋長策當何定威名仰昔時送陳給事中赴湖廣㕘議秋髙憑逺色為送武昌行畫省名原重叅藩位不輕江樓千里目湘竹四時情試發郢中倡應希和者聲至後送馬西𤣥侍郎赴京一從吹管動陽氣物應知河栁滋將遍江梅爛已施人才南就日吾道北歸時制作今皇志宗儒在禮司送江京兆景熈赴京赫赫都門坐鎮來三年為政不凡才能令江上風濤鬱復道人間夜戸開遶郭青山常帶雨經春芳樹早生梅揚帆又送朝天去待報明廷寵璽回送聞石塘尚書赴京下榻長安彼一時復從南土奉光儀憐才近世難公似論德中朝亦我師山郭欲銷殘暑氣江帆只待好風吹惟應去後遥相望夜夜台階紫極垂晨赴太學楊栁青青古栢連一區為舍去人偏惟將閉户供長日祗過圜橋踏曉煙禁裏啼鶯春樹滿池邊滋草露華鮮幽情自愛羣芳發物色風光共逺天南都清明羣山遶郭大江流復作金陵浩蕩遊帝里歌鍾行處是人家垂栁映門幽微風竹樹揺晴日薄暮樓船散水洲莫謂花開還落去曽相舞勸百盃休春日同諸年友故漢王府宴集故園亭榭鬱參差暇日親朋盡在茲早屬風光為地主兼多水竹弄幽姿侵堦藉草銜杯滿夾路垂楊去馬遲勿謂樽空又分手他年相望足相思春日飲顧東橋園時蔣子雲方伯同坐棄官江上肯歸耕幾畝城中喜自營結宇故栽芳樹滿看山不斷白雲生身裁鶴氅稱居士家本龍門逺俗情為掃落花名蔣徑春來吾忝衆賔行春日聞人邦正招至徐氏東園戚里園亭傍水開主人延客夕陽催城邊踏草尋幽徑石上流泉浸碧苔幾畆但愁芳樹歇一春常聽好鶯來頗聞絶勝蘭亭日亦忝茲遊與上才楊㕘仁甫招至東麓亭上幽棲半嶺白雲生曲磴隨巖碧蔓縈閣上晴光連御栁城中流水帶山楹憑欄厯厯羣峯出種竹蕭蕭一院成不似邀歡為地主獨能選擇此來行送秦鳳山尚書致仕歸無錫如聞珍重疏閒情為遣安車遂晩榮海上青山歸舊隠籬邊黄菊待遄征衣冠願謝明時事功德長垂君子名無限觀人多下涙追攀不復駐髙旌丙申至日太學齋居和費鐘石侍郎喜晴次韻竟夕隂雲掩太清髙齋寥廓對松聲長風忽送銀河出倒月能翻壁水晴夾路旌旗凌海日中宵星宿帶壇燈為歡天意成禋祀一曲真堪答聖明内兄來自松江留宿雞鳴山舍一别清揚那更攀相思只上對門山山中亂木愁仍劇海上歸雲夢幾還自爾驚人生白髪聊因為客慰離顔一尊雖復同明月恐是來朝東出闗費鐘石侍郎宅宴集用聯句韻奉酬一首敢擬文星聚此宵春來冠葢忝相招不妨四坐隨佳㑹實托羣公在本朝華燭光中清漏滴玉簫聲外綵雲飄新詩字字歸能咏曽比鳴球盡可敲送傅光禄朝晉赴京都門清雅古來名復此微官托俊英南陌聯鑣常日得西郊别袂片時輕春帆處處江花落寒食朝朝山雨生無限垂楊堪繫纜臨流且為一尊傾送傅御史歸省江漢滔滔制節繁榴花五月映歸軒身邊鳳字供親夀階下驄鞍荷主恩杖屨舊稱君子德詩書今並母儀論東南若到稱觴日定有葱煙上里門送錢給事出守袁州錢舊南昌推官載筆洪州日月遷至今歌頌四明賢乙明自悔春田訟伯起如多夜餽還鎖闥移官仍楚俗褰帷行縣亦章邊道途若問新為守應有人傳佐郡年題陳司封榮壽瞻思巻浙水吳山産獨竒為郎宰府衆人推皇恩并録三遷日愛子忻承七袠時閣上龍章多氣色尊前象服有威儀還聞常為稱觴罷永痛遊仙更一悲吳郎中母輓詩獨乗鶴駕去安之儷美髙堂彼一時總角圖詩多自授薦筵蘋藻尚人知河山百里天書映邑井千年母德垂惟有沾襟身貴後大夫無日不親思送陳給事赴京陳紹興人明時臺諫道俱申瑣闥留朝諷議臣補衮宣年多志意探書禹穴舊經綸江城日出青山合海路雲生采鷁新共送晨風來祖席依依應戀玉為人雞鳴山望𤣥武湖金陵天下險茲山在北門憑髙覽八極夕陽滿平原雜花落巖樹大江正東奔餘流注為澤春水何其繁洲島列相望鳬鷺鳴相喧波光靜可鑒照影羣山翻千年寄歌舞百里滋蘭蓀時時出雲霧長添王氣存無題茵席溝渠各所宜巧耶有道得如斯平生正不人憐受豈有烏頭變白時愚谷集巻二
